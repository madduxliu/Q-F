        function renderReceivables() {
            var months = ['all','01','02','03','04','05','06','07','08','09','10','11','12'];
            var monthNames = {'all':'全部','01':'1月','02':'2月','03':'3月','04':'4月','05':'5月','06':'6月','07':'7月','08':'8月','09':'9月','10':'10月','11':'11月','12':'12月'};
            
            // 取得所有專案碼
            var projectIds = ['all'];
            state.data.receivables.forEach(function(r) {
                if (r.projectId && projectIds.indexOf(r.projectId) < 0) {
                    projectIds.push(r.projectId);
                }
            });
            projectIds.sort();
            
            // 篩選資料 (支援 ISO 和民國日期格式)
            var searchTerm = (state.receivablesSearch || '').toLowerCase();
            var filtered = state.data.receivables.filter(function(r) {
                var monthMatch = state.receivablesMonth === 'all' || getMonthFromDate(r.date) === state.receivablesMonth;
                var projMatch = state.receivablesProject === 'all' || r.projectId === state.receivablesProject;
                var payMatch = state.receivablesPayment === 'all' || r.paymentMethod === state.receivablesPayment;
                var searchMatch = !searchTerm || 
                    (r.customer && r.customer.toLowerCase().indexOf(searchTerm) >= 0) ||
                    (r.description && r.description.toLowerCase().indexOf(searchTerm) >= 0) ||
                    (r.customerCode && r.customerCode.toLowerCase().indexOf(searchTerm) >= 0) ||
                    (r.projectId && r.projectId.toLowerCase().indexOf(searchTerm) >= 0);
                return monthMatch && projMatch && payMatch && searchMatch;
            });
            
            // 計算篩選後統計
            var filteredReceived = filtered.filter(function(r) { return r.status === '已收款'; }).reduce(function(s, r) { return s + safeAmount(r.amount); }, 0);
            var filteredPending = filtered.filter(function(r) { return r.status === '待收款'; }).reduce(function(s, r) { return s + safeAmount(r.amount); }, 0);
            var filteredTotal = filteredReceived + filteredPending;
            
            // 計算現金/匯款統計（只計已收款）
            var cashReceived = filtered.filter(function(r) { return r.status === '已收款' && r.paymentMethod === '現金'; }).reduce(function(s, r) { return s + safeAmount(r.amount); }, 0);
            var transferReceived = filtered.filter(function(r) { return r.status === '已收款' && r.paymentMethod !== '現金'; }).reduce(function(s, r) { return s + safeAmount(r.amount); }, 0);
            
            // 計算到期提醒
            var today = new Date();
            today.setHours(0, 0, 0, 0);
            var sevenDaysLater = new Date(today);
            sevenDaysLater.setDate(sevenDaysLater.getDate() + 7);
            
            var overdueItems = [];  // 已逾期
            var dueSoonItems = [];  // 7天內到期
            
            state.data.receivables.forEach(function(r) {
                if (r.status === '待收款' && r.dueDate) {
                    var dueDate = new Date(r.dueDate);
                    dueDate.setHours(0, 0, 0, 0);
                    if (dueDate < today) {
                        overdueItems.push(r);
                    } else if (dueDate <= sevenDaysLater) {
                        dueSoonItems.push(r);
                    }
                }
            });
            
            var stats = calcReceivables();
            
            // 月份按鈕 (支援 ISO 和民國日期格式)
            var monthBtns = months.map(function(m) {
                var active = state.receivablesMonth === m ? 'btn-primary' : '';
                var mCount = m === 'all' ? state.data.receivables.length : 
                    state.data.receivables.filter(function(r) { 
                        return getMonthFromDate(r.date) === m;
                    }).length;
                var label = monthNames[m] + (mCount > 0 ? '<span class="text-xs ml-1">(' + mCount + ')</span>' : '');
                return '<button class="btn btn-sm ' + active + '" onclick="filterReceivables(\'' + m + '\', null, null)">' + label + '</button>';
            }).join('');
            
            // 專案選單
            var projOptions = projectIds.map(function(pid) {
                var selected = state.receivablesProject === pid ? 'selected' : '';
                var label = pid === 'all' ? '全部專案' : pid;
                // 計算該專案筆數
                var pCount = pid === 'all' ? state.data.receivables.length :
                    state.data.receivables.filter(function(r) { return r.projectId === pid; }).length;
                return '<option value="' + pid + '" ' + selected + '>' + label + ' (' + pCount + ')</option>';
            }).join('');
            
            var rows = filtered.map(function(r, idx) {
                var realIdx = state.data.receivables.indexOf(r);
                var statusClass = r.status === '已收款' ? 'badge-green' : 'badge-yellow';
                
                // 計算到期狀態
                var dueBadge = '';
                if (r.status === '待收款' && r.dueDate) {
                    var dueDate = new Date(r.dueDate);
                    dueDate.setHours(0, 0, 0, 0);
                    var today = new Date();
                    today.setHours(0, 0, 0, 0);
                    var sevenDaysLater = new Date(today);
                    sevenDaysLater.setDate(sevenDaysLater.getDate() + 7);
                    
                    if (dueDate < today) {
                        dueBadge = '<span class="badge badge-red text-xs ml-1">逾期</span>';
                    } else if (dueDate <= sevenDaysLater) {
                        dueBadge = '<span class="badge badge-orange text-xs ml-1">即將到期</span>';
                    }
                }
                
                // 檢查客戶勾稽狀態
                var customerLinked = r.customerCode && (state.data.customers || []).some(function(c) { return c.code === r.customerCode; });
                var customerBadge = r.customerCode ? 
                    (customerLinked ? 
                        '<span class="badge badge-green text-xs">' + r.customerCode + '</span>' : 
                        '<span class="badge badge-yellow text-xs" title="客戶編碼未找到">' + r.customerCode + ' ?</span>') :
                    '<span class="badge badge-red text-xs" title="未設定客戶編碼">未設定</span>';
                
                // 檢查專案勾稽狀態
                var projectLinked = r.projectId && (state.data.projects || []).some(function(p) { return p.id === r.projectId; });
                var projectBadge = r.projectId ? 
                    (projectLinked ? 
                        '<span class="badge badge-blue text-xs">' + r.projectId + '</span>' : 
                        '<span class="badge badge-yellow text-xs" title="專案未找到">' + r.projectId + ' ?</span>') :
                    '<span class="text-xs text-slate-400">-</span>';
                
                // 付款方式
                var payMethodBadge = r.paymentMethod === '現金' ? 
                    '<span class="badge badge-yellow text-xs">現金</span>' : 
                    '<span class="badge badge-blue text-xs">匯款</span>';
                
                // 預計收款日顯示（優先使用expectedDate）
                var displayDate = r.expectedDate || r.dueDate;
                var dueDateDisplay = displayDate ? '<span class="text-xs text-slate-500">' + displayDate + '</span>' : '-';
                
                // 勾選狀態
                var isChecked = state.selectedReceivables.indexOf(realIdx) >= 0;
                
                return '<tr>' +
                    '<td><input type="checkbox" ' + (isChecked ? 'checked' : '') + ' onclick="toggleSelectReceivable(' + realIdx + ')" data-idx="' + realIdx + '"></td>' +
                    '<td class="text-xs text-slate-400">' + escapeHtml(r.id) + '</td>' +
                    '<td>' + escapeHtml(r.date || '-') + '</td>' +
                    '<td>' + dueDateDisplay + dueBadge + '</td>' +
                    '<td>' + customerBadge + '</td>' +
                    '<td><span class="font-medium">' + escapeHtml(r.customer) + '</span></td>' +
                    '<td>' + projectBadge + '</td>' +
                    '<td class="text-sm">' + escapeHtml(r.description) + '</td>' +
                    '<td class="text-sm text-slate-500">' + escapeHtml(r.invoice || '-') + '</td>' +
                    '<td>' + payMethodBadge + '</td>' +
                    '<td class="text-right font-medium">' + formatCurrency(r.amount) + '</td>' +
                    '<td><span class="badge ' + statusClass + '">' + r.status + '</span></td>' +
                    '<td class="text-center" style="white-space:nowrap">' +
                    '<button class="btn btn-sm btn-warning mr-1" onclick="showEditReceivableModal(' + realIdx + ')" title="編輯">' +
                    '<i class="fas fa-edit"></i></button>' +
                    '<button class="btn btn-sm btn-primary mr-1" onclick="toggleReceivableStatus(' + realIdx + ')" title="切換狀態">' +
                    '<i class="fas fa-exchange-alt"></i></button>' +
                    '<button class="btn btn-sm btn-danger" onclick="deleteReceivable(' + realIdx + ')" title="刪除">' +
                    '<i class="fas fa-trash"></i></button>' +
                    '</td></tr>';
            }).join('');
            
            // 客戶統計
            var customerStats = {};
            filtered.forEach(function(r) {
                if (!customerStats[r.customer]) customerStats[r.customer] = 0;
                customerStats[r.customer] += r.amount;
            });
            var customerBadges = '';
            Object.keys(customerStats).sort(function(a,b) { return customerStats[b] - customerStats[a]; }).forEach(function(c) {
                customerBadges += '<span class="inline-block mr-2 mb-1 text-xs"><span class="badge badge-blue">' + escapeHtml(c) + '</span> ' + formatCurrency(customerStats[c]) + '</span>';
            });
            
            // 判斷是否有篩選
            var isFiltered = state.receivablesMonth !== 'all' || state.receivablesProject !== 'all' || state.receivablesPayment !== 'all';
            var totalLabel = isFiltered ? '篩選總計' : '全部總計';
            var totalValue = isFiltered ? filteredTotal : stats.total;
            var totalCount = isFiltered ? filtered.length : state.data.receivables.length;
            
            // 付款方式選項
            var paymentOptions = '<option value="all"' + (state.receivablesPayment === 'all' ? ' selected' : '') + '>全部方式</option>' +
                '<option value="現金"' + (state.receivablesPayment === '現金' ? ' selected' : '') + '>現金</option>' +
                '<option value="匯款"' + (state.receivablesPayment === '匯款' ? ' selected' : '') + '>匯款</option>';
            
            // 建立提醒區塊
            var alertHtml = '';
            if (overdueItems.length > 0 || dueSoonItems.length > 0) {
                alertHtml = '<div class="mb-4">';
                if (overdueItems.length > 0) {
                    var overdueTotal = overdueItems.reduce(function(s, r) { return s + safeAmount(r.amount); }, 0);
                    alertHtml += '<div class="card p-3 mb-2" style="background:#fef2f2;border:1px solid #fecaca">' +
                        '<div class="flex items-center justify-between">' +
                        '<div class="flex items-center gap-2">' +
                        '<i class="fas fa-exclamation-circle text-red-500"></i>' +
                        '<span class="font-bold text-red-700">已逾期 ' + overdueItems.length + ' 筆</span>' +
                        '<span class="text-red-600">共 ' + formatCurrency(overdueTotal) + '</span>' +
                        '</div>' +
                        '<div class="text-sm text-red-600">' + overdueItems.map(function(r) {
                            return escapeHtml(r.customer) + ' ' + formatCurrency(r.amount);
                        }).join(' | ') + '</div>' +
                        '</div></div>';
                }
                if (dueSoonItems.length > 0) {
                    var dueSoonTotal = dueSoonItems.reduce(function(s, r) { return s + safeAmount(r.amount); }, 0);
                    alertHtml += '<div class="card p-3" style="background:#fffbeb;border:1px solid #fde68a">' +
                        '<div class="flex items-center justify-between">' +
                        '<div class="flex items-center gap-2">' +
                        '<i class="fas fa-bell text-orange-500"></i>' +
                        '<span class="font-bold text-orange-700">7天內到期 ' + dueSoonItems.length + ' 筆</span>' +
                        '<span class="text-orange-600">共 ' + formatCurrency(dueSoonTotal) + '</span>' +
                        '</div>' +
                        '<div class="text-sm text-orange-600">' + dueSoonItems.map(function(r) {
                            return escapeHtml(r.customer) + ' ' + formatCurrency(r.amount) + ' (' + escapeHtml(r.dueDate) + ')';
                        }).join(' | ') + '</div>' +
                        '</div></div>';
                }
                alertHtml += '</div>';
            }
            
            return '<div class="p-6 animate-fade-in">' +
                // 提醒區塊
                alertHtml +
                // 統計卡片 - 一行5個
                '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;margin-bottom:1rem">' +
                '<div class="card p-4"><span class="text-sm text-slate-500">已收款</span><p class="text-xl font-bold text-green-600">' + formatCurrency(filteredReceived) + '</p></div>' +
                '<div class="card p-4"><span class="text-sm text-slate-500">待收款</span><p class="text-xl font-bold text-orange-600">' + formatCurrency(filteredPending) + '</p></div>' +
                '<div class="card p-4"><span class="text-sm text-slate-500">現金收款</span><p class="text-xl font-bold text-yellow-600">' + formatCurrency(cashReceived) + '</p></div>' +
                '<div class="card p-4"><span class="text-sm text-slate-500">匯款收款</span><p class="text-xl font-bold text-blue-600">' + formatCurrency(transferReceived) + '</p></div>' +
                '<div class="card p-4 bg-blue-50"><span class="text-sm text-blue-600">' + totalLabel + '</span><p class="text-xl font-bold text-blue-600">' + formatCurrency(totalValue) + '</p><p class="text-xs text-slate-400">' + totalCount + ' 筆</p></div>' +
                '</div>' +
                
                // 篩選工具列
                '<div class="card p-4 mb-4">' +
                '<div class="flex justify-between items-center mb-3">' +
                '<div class="flex items-center gap-4">' +
                '<div class="flex items-center gap-2">' +
                '<span class="text-sm font-medium">月份:</span>' +
                '<div class="flex flex-wrap gap-1">' + monthBtns + '</div>' +
                '</div>' +
                '<div class="flex items-center gap-2">' +
                '<span class="text-sm font-medium">專案:</span>' +
                '<select class="form-input text-sm py-1" onchange="filterReceivables(null, this.value, null)">' + projOptions + '</select>' +
                '</div>' +
                '<div class="flex items-center gap-2">' +
                '<span class="text-sm font-medium">收款方式:</span>' +
                '<select class="form-input text-sm py-1" onchange="filterReceivables(null, null, this.value)">' + paymentOptions + '</select>' +
                '</div>' +
                '</div>' +
                '<div class="flex gap-2">' +
                '<button class="btn btn-primary btn-sm" onclick="showAddReceivableModal()"><i class="fas fa-plus mr-1"></i>新增</button>' +
                '<button class="btn btn-success btn-sm" onclick="exportReceivables()"><i class="fas fa-file-excel mr-1"></i>匯出</button>' +
                '<button class="btn btn-secondary btn-sm" onclick="printReceivables()"><i class="fas fa-print mr-1"></i>列印</button>' +
                '</div></div>' +
                // 搜尋框和批次操作
                '<div class="flex justify-between items-center pt-3 border-t">' +
                '<div class="flex items-center gap-4">' +
                '<div class="flex items-center gap-2">' +
                '<i class="fas fa-search text-slate-400"></i>' +
                '<input type="text" class="form-input text-sm py-1" style="width:200px" placeholder="搜尋客戶/說明/專案..." value="' + (state.receivablesSearch || '') + '" onkeyup="searchReceivables(this.value)">' +
                '</div>' +
                (state.selectedReceivables.length > 0 ? 
                '<div class="flex items-center gap-2 bg-blue-50 px-3 py-1 rounded">' +
                '<span class="text-sm text-blue-600">已選 ' + state.selectedReceivables.length + ' 筆</span>' +
                '<button class="btn btn-sm btn-success" onclick="batchMarkReceived()"><i class="fas fa-check mr-1"></i>批次標記已收款</button>' +
                '<button class="btn btn-sm btn-danger" onclick="batchDeleteReceivables()"><i class="fas fa-trash mr-1"></i>批次刪除</button>' +
                '<button class="btn btn-sm" onclick="clearSelectedReceivables()"><i class="fas fa-times"></i></button>' +
                '</div>' : '') +
                '</div>' +
                (customerBadges ? '<div>' + customerBadges + '</div>' : '') +
                '</div>' +
                '</div>' +
                
                // 明細表格
                '<div class="card overflow-x-auto">' +
                '<div class="p-3 bg-slate-50 border-b">' +
                '<h4 class="font-bold"><i class="fas fa-list mr-2"></i>應收明細 (' + filtered.length + '筆)</h4>' +
                '</div>' +
                '<div id="ar-table-scroll" style="max-height:650px;overflow-y:auto">' +
                '<table class="text-sm"><thead class="sticky top-0 bg-white"><tr>' +
                '<th style="width:30px"><input type="checkbox" onclick="toggleAllReceivables(this.checked)" title="全選"></th><th>編號</th><th>製單日期</th><th>預計收款</th><th>客戶編碼</th><th>客戶</th><th>專案</th><th>說明</th><th>發票</th><th>收款方式</th><th class="text-right">金額</th><th>狀態</th><th>操作</th>' +
                '</tr></thead><tbody>' + rows + '</tbody></table></div></div></div>';
        }
        
        function filterReceivables(month, project, payment) {
            if (month !== null) state.receivablesMonth = month;
            if (project !== null) state.receivablesProject = project;
            if (payment !== null) state.receivablesPayment = payment;
            render(true);
        }
        
        // 應收帳款搜尋
        function searchReceivables(term) {
            state.receivablesSearch = term;
            render(true);
        }
        
        // 切換單筆應收帳款選擇
        function toggleSelectReceivable(idx) {
            var pos = state.selectedReceivables.indexOf(idx);
            if (pos >= 0) {
                state.selectedReceivables.splice(pos, 1);
            } else {
                state.selectedReceivables.push(idx);
            }
            render(true);
        }
        
        // 全選/取消全選應收帳款
        function toggleAllReceivables(checked) {
            if (checked) {
                // 選擇當前篩選結果中的所有待收款項目
                var searchTerm = (state.receivablesSearch || '').toLowerCase();
                state.selectedReceivables = [];
                state.data.receivables.forEach(function(r, idx) {
                    var monthMatch = state.receivablesMonth === 'all' || getMonthFromDate(r.date) === state.receivablesMonth;
                    var projMatch = state.receivablesProject === 'all' || r.projectId === state.receivablesProject;
                    var payMatch = state.receivablesPayment === 'all' || r.paymentMethod === state.receivablesPayment;
                    var searchMatch = !searchTerm || 
                        (r.customer && r.customer.toLowerCase().indexOf(searchTerm) >= 0) ||
                        (r.description && r.description.toLowerCase().indexOf(searchTerm) >= 0);
                    if (monthMatch && projMatch && payMatch && searchMatch) {
                        state.selectedReceivables.push(idx);
                    }
                });
            } else {
                state.selectedReceivables = [];
            }
            render(true);
        }
        
        // 清除應收帳款選擇
        function clearSelectedReceivables() {
            state.selectedReceivables = [];
            render(true);
        }
        
        // 批次標記已收款
        function batchMarkReceived() {
            if (state.selectedReceivables.length === 0) return;
            var count = 0;
            state.selectedReceivables.forEach(function(idx) {
                if (state.data.receivables[idx] && state.data.receivables[idx].status === '待收款') {
                    state.data.receivables[idx].status = '已收款';
                    count++;
                }
            });
            if (count > 0) {
                saveData();
                showToast('✅ 已將 ' + count + ' 筆標記為已收款', 'success');
            }
            state.selectedReceivables = [];
            render(true);
        }
        
        // 批次刪除應收帳款
        function batchDeleteReceivables() {
            if (state.selectedReceivables.length === 0) return;
            if (!confirm('確定要刪除選中的 ' + state.selectedReceivables.length + ' 筆應收帳款？此操作無法復原。')) return;
            // 從大到小排序，確保刪除時索引正確
            var sorted = state.selectedReceivables.slice().sort(function(a, b) { return b - a; });
            sorted.forEach(function(idx) {
                state.data.receivables.splice(idx, 1);
            });
            saveData();
            state.selectedReceivables = [];
            render(true);
        }
        
        // 列印應收帳款
        function printReceivables() {
            var printWindow = window.open('', '_blank');
            printWindow.document.write('<html><head><title>應收帳款明細 - ' + state.data.company.name + '</title>');
            printWindow.document.write('<style>body{font-family:sans-serif;padding:20px}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border:1px solid #ddd;padding:6px;text-align:left}th{background:#1e293b;color:white}.text-right{text-align:right}.font-bold{font-weight:bold}.badge{padding:2px 6px;border-radius:4px;font-size:10px}.badge-green{background:#dcfce7;color:#166534}.badge-yellow{background:#fef3c7;color:#92400e}@media print{.no-print{display:none!important}}</style>');
            printWindow.document.write('</head><body>');
            printWindow.document.write('<h1>' + state.data.company.name + '</h1>');
            printWindow.document.write('<h2>應收帳款明細</h2>');
            printWindow.document.write('<p>列印日期: ' + new Date().toLocaleDateString('zh-TW') + '</p>');
            
            var tableHtml = '<table><thead><tr><th>編號</th><th>日期</th><th>客戶</th><th>專案</th><th>說明</th><th>發票</th><th class="text-right">金額</th><th>狀態</th></tr></thead><tbody>';
            
            var searchTerm = (state.receivablesSearch || '').toLowerCase();
            var total = 0;
            state.data.receivables.forEach(function(r) {
                var monthMatch = state.receivablesMonth === 'all' || getMonthFromDate(r.date) === state.receivablesMonth;
                var projMatch = state.receivablesProject === 'all' || r.projectId === state.receivablesProject;
                var payMatch = state.receivablesPayment === 'all' || r.paymentMethod === state.receivablesPayment;
                var searchMatch = !searchTerm || 
                    (r.customer && r.customer.toLowerCase().indexOf(searchTerm) >= 0) ||
                    (r.description && r.description.toLowerCase().indexOf(searchTerm) >= 0);
                if (monthMatch && projMatch && payMatch && searchMatch) {
                    var statusClass = r.status === '已收款' ? 'badge-green' : 'badge-yellow';
                    tableHtml += '<tr><td>' + escapeHtml(r.id) + '</td><td>' + escapeHtml(r.date || '-') + '</td><td>' + escapeHtml(r.customer) + '</td><td>' + escapeHtml(r.projectId || '-') + '</td><td>' + escapeHtml(r.description || '-') + '</td><td>' + escapeHtml(r.invoice || '-') + '</td><td class="text-right">' + formatCurrency(r.amount) + '</td><td><span class="badge ' + statusClass + '">' + escapeHtml(r.status) + '</span></td></tr>';
                    total += r.amount;
                }
            });
            tableHtml += '<tr class="font-bold"><td colspan="6">合計</td><td class="text-right">' + formatCurrency(total) + '</td><td></td></tr>';
            tableHtml += '</tbody></table>';
            
            printWindow.document.write(tableHtml);
            printWindow.document.write('</body></html>');
            printWindow.document.close();
            printWindow.print();
        }
        
        // ========== 請款單管理 ==========
        function renderInvoices() {
            // 取得待收款的應收帳款（可產生請款單）
            var pendingReceivables = state.data.receivables.filter(function(r) {
                return r.status === '待收款';
            });
            
            // 已產生的請款單
            var invoices = state.data.invoices || [];
            
            // 按專案分組待收款
            var byProject = {};
            pendingReceivables.forEach(function(r) {
                var key = r.projectId || 'none';
                if (!byProject[key]) {
                    byProject[key] = {
                        projectId: r.projectId,
                        customer: r.customer,
                        customerCode: r.customerCode,
                        items: [],
                        total: 0
                    };
                }
                byProject[key].items.push(r);
                byProject[key].total += r.amount;
            });
            
            // 專案卡片
            var projectCards = Object.keys(byProject).map(function(key) {
                var proj = byProject[key];
                var project = (state.data.projects || []).find(function(p) { return p.id === key; });
                var projectName = project ? project.name : '未指定專案';
                var invoiceSetting = project ? project.invoice : '有';
                var invoiceClass = invoiceSetting === '有' ? 'text-green-600' : 'text-orange-600';
                
                var itemRows = proj.items.map(function(r, idx) {
                    return '<tr class="border-b">' +
                        '<td class="py-2"><input type="checkbox" class="invoice-item" data-ar-id="' + r.id + '" data-amount="' + r.amount + '" checked></td>' +
                        '<td class="py-2 text-xs text-slate-400">' + r.id + '</td>' +
                        '<td class="py-2">' + r.description + '</td>' +
                        '<td class="py-2 text-xs">' + (r.expectedDate || '未設定') + '</td>' +
                        '<td class="py-2 text-right font-medium">' + formatCurrency(r.amount) + '</td>' +
                        '</tr>';
                }).join('');
                
                return '<div class="card p-4 mb-4">' +
                    '<div class="flex justify-between items-start mb-3">' +
                    '<div>' +
                    '<div class="flex items-center gap-2">' +
                    '<span class="badge badge-blue">' + key + '</span>' +
                    '<span class="font-bold">' + projectName.substring(0, 30) + '</span>' +
                    '</div>' +
                    '<div class="text-sm text-slate-500 mt-1">' +
                    '<span>客戶：' + proj.customer + '</span>' +
                    '<span class="ml-3">發票：<span class="font-bold ' + invoiceClass + '">' + invoiceSetting + '</span></span>' +
                    '</div></div>' +
                    '<div class="text-right">' +
                    '<div class="text-lg font-bold text-blue-600">' + formatCurrency(proj.total) + '</div>' +
                    '<div class="text-xs text-slate-400">' + proj.items.length + ' 筆待收</div>' +
                    '</div></div>' +
                    '<table class="w-full text-sm">' +
                    '<thead class="bg-slate-50"><tr>' +
                    '<th class="py-2 w-8"><input type="checkbox" checked onclick="toggleProjectInvoiceItems(\'' + key + '\', this.checked)"></th>' +
                    '<th class="py-2 text-left">編號</th><th class="py-2 text-left">說明</th>' +
                    '<th class="py-2 text-left">預計收款</th><th class="py-2 text-right">金額</th>' +
                    '</tr></thead><tbody>' + itemRows + '</tbody></table>' +
                    '<div class="mt-3 pt-3 border-t flex justify-between items-center">' +
                    '<div class="text-sm text-slate-500">勾選項目合計：<span class="font-bold text-blue-600" id="proj-total-' + key + '">' + formatCurrency(proj.total) + '</span></div>' +
                    '<button class="btn btn-primary btn-sm" onclick="generateInvoice(\'' + key + '\')"><i class="fas fa-file-invoice mr-1"></i>產生請款單</button>' +
                    '</div></div>';
            }).join('');
            
            if (Object.keys(byProject).length === 0) {
                projectCards = '<div class="card p-8 text-center text-slate-400">' +
                    '<i class="fas fa-check-circle text-4xl mb-3 text-green-300"></i>' +
                    '<p>目前沒有待收款項目</p>' +
                    '</div>';

            checkboxes.forEach(function(cb) {
                var arId = cb.getAttribute('data-ar-id');
                var ar = state.data.receivables.find(function(r) { return r.id === arId; });
                if (ar && ar.projectId === projectId) {
                    cb.checked = checked;
                }
                if (cb.checked) {
                    total += parseInt(cb.getAttribute('data-amount')) || 0;
                }
            });

            if (totalEl) totalEl.textContent = formatCurrency(total);

        function generateInvoice(projectId) {
            // 取得勾選的項目
            var checkboxes = document.querySelectorAll('.invoice-item:checked');
            var selectedItems = [];
            var totalAmount = 0;
            
            checkboxes.forEach(function(cb) {
                var arId = cb.getAttribute('data-ar-id');
                var ar = state.data.receivables.find(function(r) { return r.id === arId; });
                if (ar && ar.projectId === projectId) {
                    selectedItems.push(ar);
                    totalAmount += ar.amount;
                }
            });
            
            if (selectedItems.length === 0) {
                showToast('⚠️ 請至少勾選一個項目', 'warning');
                return;
            }
            
            // 產生請款單編號
            if (!state.data.invoices) state.data.invoices = [];
            var maxNum = 0;
            state.data.invoices.forEach(function(inv) {
                var num = parseInt(inv.id.replace('INV', ''));
                if (num > maxNum) maxNum = num;
            });
            
            var today = new Date();
            var dateStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
            
            var project = (state.data.projects || []).find(function(p) { return p.id === projectId; });
            var descriptions = selectedItems.map(function(r) { return r.description.split(' ').pop(); }).join('、');
            
            var invoice = {
                id: 'INV' + String(maxNum + 1).padStart(4, '0'),
                date: dateStr,
                projectId: projectId,
                customer: selectedItems[0].customer,
                customerCode: selectedItems[0].customerCode,
                description: descriptions,
                amount: totalAmount,
                items: selectedItems.map(function(r) { return r.id; }),
                status: '待收款',
                invoice: project ? project.invoice : '有',
                paymentMethod: project && project.invoice === '無' ? '現金' : '匯款'
            };
            
            state.data.invoices.push(invoice);
            saveData();
            render();
            
            showToast('✅ 已產生請款單：' + invoice.id + ' (' + formatCurrency(totalAmount) + ')', 'success');
        }

        function markInvoicePaid(idx) {
            var inv = state.data.invoices[idx];
            if (inv.status === '已收款') {
                showToast('⚠️ 此請款單已標記為已收款', 'warning');
                return;
            }
            
            if (confirm('確定將請款單 ' + inv.id + ' 標記為已收款？\n\n這將同時更新對應的應收帳款狀態。')) {
                inv.status = '已收款';
                inv.paidDate = new Date().toISOString().split('T')[0];
                
                // 更新對應的應收帳款
                inv.items.forEach(function(arId) {
                    var ar = state.data.receivables.find(function(r) { return r.id === arId; });
                    if (ar) ar.status = '已收款';
                });
                
                saveData();
                render();
            }
        }

                saveData();
                render();
            }

        function renderPayables() {
            var months = ['all','01','02','03','04','05','06','07','08','09','10','11','12'];
            var monthNames = {'all':'全部','01':'1月','02':'2月','03':'3月','04':'4月','05':'5月','06':'6月','07':'7月','08':'8月','09':'9月','10':'10月','11':'11月','12':'12月'};
            var categories = ['all','工程成本','薪資','勞保費','健保費','勞退金','原物料','加工費','外包工程','代付款項','租金','水電費','運輸費','交通油費','會計稅務','保險費','電信費','伙食費','設備採購','汽車維修','稅金','未註記支出','其他'];
            
            // 取得所有專案碼
            var projectIds = ['all'];
            state.data.payables.forEach(function(p) {
                if (p.projectId && projectIds.indexOf(p.projectId) < 0) {
                    projectIds.push(p.projectId);
                }
            });
            projectIds.sort();
            
            // 篩選資料 (支援 ISO 和民國日期格式)
            var paySearchTerm = (state.payablesSearch || '').toLowerCase();
            var filtered = state.data.payables.filter(function(p) {
                var monthMatch = state.payablesMonth === 'all' || getMonthFromDate(p.date) === state.payablesMonth;
                var catMatch = state.payablesCategory === 'all' || p.category === state.payablesCategory;
                var projMatch = state.payablesProject === 'all' || p.projectId === state.payablesProject;
                var payMatch = state.payablesPayment === 'all' || p.paymentMethod === state.payablesPayment;
                var searchMatch = !paySearchTerm || 
                    (p.vendor && p.vendor.toLowerCase().indexOf(paySearchTerm) >= 0) ||
                    (p.description && p.description.toLowerCase().indexOf(paySearchTerm) >= 0) ||
                    (p.invoiceNo && p.invoiceNo.toLowerCase().indexOf(paySearchTerm) >= 0) ||
                    (p.projectId && p.projectId.toLowerCase().indexOf(paySearchTerm) >= 0);
                return monthMatch && catMatch && projMatch && payMatch && searchMatch;
            });
            
            // 計算篩選後的統計
            var filteredPaid = filtered.filter(function(p) { return p.status === '已付款'; }).reduce(function(s, p) { return s + safeAmount(p.amount); }, 0);
            var filteredPending = filtered.filter(function(p) { return p.status === '待付款'; }).reduce(function(s, p) { return s + safeAmount(p.amount); }, 0);
            var filteredTotal = filteredPaid + filteredPending;
            
            // 計算到期提醒
            var today = new Date();
            today.setHours(0, 0, 0, 0);
            var sevenDaysLater = new Date(today);
            sevenDaysLater.setDate(sevenDaysLater.getDate() + 7);
            
            var overduePayables = [];  // 已逾期
            var dueSoonPayables = [];  // 7天內到期
            
            state.data.payables.forEach(function(p) {
                if (p.status === '待付款' && p.dueDate) {
                    var dueDate = new Date(p.dueDate);
                    dueDate.setHours(0, 0, 0, 0);
                    if (dueDate < today) {
                        overduePayables.push(p);
                    } else if (dueDate <= sevenDaysLater) {
                        dueSoonPayables.push(p);
                    }
                }
            });
            
            // 全部資料統計
            var stats = calcPayables();
            
            // 月份按鈕 (支援 ISO 和民國日期格式)
            var monthBtns = months.map(function(m) {
                var active = state.payablesMonth === m ? 'btn-primary' : '';
                // 計算該月筆數
                var mCount = m === 'all' ? state.data.payables.length : 
                    state.data.payables.filter(function(p) { return getMonthFromDate(p.date) === m; }).length;
                var label = monthNames[m] + (mCount > 0 ? '<span class="text-xs ml-1">(' + mCount + ')</span>' : '');
                return '<button class="btn btn-sm ' + active + '" onclick="filterPayables(\'' + m + '\',null,null,null)">' + label + '</button>';
            }).join('');
            
            // 分類選單
            var catOptions = categories.map(function(c) {
                var selected = state.payablesCategory === c ? 'selected' : '';
                var label = c === 'all' ? '全部分類' : c;
                return '<option value="' + c + '" ' + selected + '>' + label + '</option>';
            }).join('');
            
            // 計算篩選後各分類小計
            var catTotals = {};
            filtered.forEach(function(p) {
                if (!catTotals[p.category]) catTotals[p.category] = 0;
                catTotals[p.category] += p.amount;
            });
            
            // 分類小計標籤
            var catBadges = '';
            categories.slice(1).forEach(function(c) {
                if (catTotals[c]) {
                    catBadges += '<span class="inline-block mr-2 mb-1 text-xs"><span class="badge badge-gray">' + c + '</span> ' + formatCurrency(catTotals[c]) + '</span>';
                }
            });
            
            // 表格資料
            var rows = filtered.map(function(p, idx) {
                var realIdx = state.data.payables.indexOf(p);
                var statusClass = p.status === '已付款' ? 'badge-green' : 'badge-yellow';
                
                // 計算到期狀態
                var dueBadge = '';
                if (p.status === '待付款' && p.dueDate) {
                    var dueDate = new Date(p.dueDate);
                    dueDate.setHours(0, 0, 0, 0);
                    var today = new Date();
                    today.setHours(0, 0, 0, 0);
                    var sevenDaysLater = new Date(today);
                    sevenDaysLater.setDate(sevenDaysLater.getDate() + 7);
                    
                    if (dueDate < today) {
                        dueBadge = '<span class="badge badge-red text-xs ml-1">逾期</span>';
                    } else if (dueDate <= sevenDaysLater) {
                        dueBadge = '<span class="badge badge-orange text-xs ml-1">即將到期</span>';
                    }
                }
                
                // 檢查專案勾稽狀態
                var projectLinked = p.projectId && (state.data.projects || []).some(function(proj) { return proj.id === p.projectId; });
                var projectBadge = p.projectId ? 
                    (projectLinked ? 
                        '<span class="badge badge-blue text-xs">' + p.projectId + '</span>' : 
                        '<span class="badge badge-yellow text-xs" title="專案未找到">' + p.projectId + ' ?</span>') :
                    '<span class="text-xs text-slate-400">-</span>';
                
                // 付款方式
                var payMethodBadge = p.paymentMethod === '現金' ? 
                    '<span class="badge badge-yellow text-xs">現金</span>' : 
                    '<span class="badge badge-blue text-xs">匯款</span>';
                
                // 預計付款日顯示
                var dueDateDisplay = p.dueDate ? '<span class="text-xs text-slate-500">' + p.dueDate + '</span>' : '-';
                
                // 勾選狀態
                var isChecked = state.selectedPayables.indexOf(realIdx) >= 0;
                
                return '<tr>' +
                    '<td><input type="checkbox" ' + (isChecked ? 'checked' : '') + ' onclick="toggleSelectPayable(' + realIdx + ')" data-idx="' + realIdx + '"></td>' +
                    '<td class="text-xs text-slate-400">' + escapeHtml(p.id) + (p.installment ? '<br><span class="badge badge-purple text-xs">' + escapeHtml(p.installment) + '</span>' : '') + '</td>' +
                    '<td>' + escapeHtml(p.date || '-') + '</td>' +
                    '<td>' + dueDateDisplay + dueBadge + '</td>' +
                    '<td><span class="badge badge-blue">' + escapeHtml(p.category) + '</span></td>' +
                    '<td class="text-xs text-slate-500">' + escapeHtml(p.vendorCode || '') + '</td>' +
                    '<td>' + escapeHtml(p.vendor) + '</td>' +
                    '<td>' + projectBadge + '</td>' +
                    '<td class="text-xs text-slate-500">' + escapeHtml(p.invoiceNo || '') + '</td>' +
                    '<td class="text-sm text-slate-500">' + (p.description !== p.vendor ? escapeHtml(p.description) : '') + '</td>' +
                    '<td>' + payMethodBadge + '</td>' +
                    '<td class="text-right font-medium">' + formatCurrency(p.amount) + '</td>' +
                    '<td><span class="badge ' + statusClass + '">' + p.status + '</span></td>' +
                    '<td class="text-center" style="white-space:nowrap">' +

            summaryRows += '<tr class="bg-blue-50">' + totalCells + '</tr>';
            
            // 計算現金/匯款統計（篩選後）
            var cashPaid = filtered.filter(function(p) { return p.status === '已付款' && p.paymentMethod === '現金'; }).reduce(function(s, p) { return s + safeAmount(p.amount); }, 0);
            var transferPaid = filtered.filter(function(p) { return p.status === '已付款' && p.paymentMethod !== '現金'; }).reduce(function(s, p) { return s + safeAmount(p.amount); }, 0);
            
            // 判斷是否有篩選

            var totalLabel = isFiltered ? '篩選總計' : '全部總計';
            var totalValue = isFiltered ? filteredTotal : stats.total;
            var totalCount = isFiltered ? filtered.length : state.data.payables.length;
            
            // 付款方式選項
            var paymentOptions = '<option value="all"' + (state.payablesPayment === 'all' ? ' selected' : '') + '>全部方式</option>' +
                '<option value="現金"' + (state.payablesPayment === '現金' ? ' selected' : '') + '>現金</option>' +
                '<option value="匯款"' + (state.payablesPayment === '匯款' ? ' selected' : '') + '>匯款</option>';
            
            // 建立提醒區塊
            var apAlertHtml = '';
            if (overduePayables.length > 0 || dueSoonPayables.length > 0) {
                apAlertHtml = '<div class="mb-4">';
                if (overduePayables.length > 0) {
                    var overdueTotal = overduePayables.reduce(function(s, p) { return s + safeAmount(p.amount); }, 0);
                    apAlertHtml += '<div class="card p-3 mb-2" style="background:#fef2f2;border:1px solid #fecaca">' +
                        '<div class="flex items-center justify-between">' +
                        '<div class="flex items-center gap-2">' +
                        '<i class="fas fa-exclamation-circle text-red-500"></i>' +
                        '<span class="font-bold text-red-700">已逾期 ' + overduePayables.length + ' 筆</span>' +
                        '<span class="text-red-600">共 ' + formatCurrency(overdueTotal) + '</span>' +
                        '</div>' +
                        '<div class="text-sm text-red-600">' + overduePayables.slice(0, 5).map(function(p) { 
                            return p.vendor + ' ' + formatCurrency(p.amount);

                        '</div></div>';
                }
                if (dueSoonPayables.length > 0) {
                    var dueSoonTotal = dueSoonPayables.reduce(function(s, p) { return s + safeAmount(p.amount); }, 0);
                    apAlertHtml += '<div class="card p-3" style="background:#fffbeb;border:1px solid #fde68a">' +
                        '<div class="flex items-center justify-between">' +
                        '<div class="flex items-center gap-2">' +
                        '<i class="fas fa-bell text-orange-500"></i>' +
                        '<span class="font-bold text-orange-700">7天內到期 ' + dueSoonPayables.length + ' 筆</span>' +
                        '<span class="text-orange-600">共 ' + formatCurrency(dueSoonTotal) + '</span>' +
                        '</div>' +
                        '<div class="text-sm text-orange-600">' + dueSoonPayables.slice(0, 5).map(function(p) { 
                            return p.vendor + ' ' + formatCurrency(p.amount) + ' (' + p.dueDate + ')'; 
                        }).join(' | ') + (dueSoonPayables.length > 5 ? ' ...' : '') + '</div>' +
                        '</div></div>';
                }
                apAlertHtml += '</div>';
            }
            
            return '<div class="p-6 animate-fade-in">' +
                // 提醒區塊
                apAlertHtml +
                // 統計卡片 - 一行5個
                '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;margin-bottom:1rem">' +
                '<div class="card p-4"><span class="text-sm text-slate-500">已付款</span><p class="text-xl font-bold text-green-600">' + formatCurrency(filteredPaid) + '</p></div>' +
                '<div class="card p-4"><span class="text-sm text-slate-500">待付款</span><p class="text-xl font-bold text-orange-600">' + formatCurrency(filteredPending) + '</p></div>' +
                '<div class="card p-4"><span class="text-sm text-slate-500">現金支付</span><p class="text-xl font-bold text-yellow-600">' + formatCurrency(cashPaid) + '</p></div>' +
                '<div class="card p-4"><span class="text-sm text-slate-500">匯款支付</span><p class="text-xl font-bold text-blue-600">' + formatCurrency(transferPaid) + '</p></div>' +
                '<div class="card p-4 bg-blue-50"><span class="text-sm text-blue-600">' + totalLabel + '</span><p class="text-xl font-bold text-blue-600">' + formatCurrency(totalValue) + '</p><p class="text-xs text-slate-400">' + totalCount + ' 筆</p></div>' +
                '</div>' +
                
                // 篩選工具列
                '<div class="card p-4 mb-4">' +
                '<div class="flex justify-between items-center mb-3">' +
                '<div class="flex items-center gap-2">' +

                '</div>' +

                '<button class="btn btn-success btn-sm" onclick="exportPayables()"><i class="fas fa-file-excel mr-1"></i>匯出</button>' +
                '<button class="btn btn-secondary btn-sm" onclick="printPayables()"><i class="fas fa-print mr-1"></i>列印</button>' +
                '</div></div>' +
                '<div class="flex items-center gap-2 flex-wrap">' +
                '<span class="text-sm font-medium">分類:</span>' +
                '<select class="form-select" style="width:150px" onchange="filterPayables(null,this.value,null,null)">' + catOptions + '</select>' +
                '<span class="text-sm font-medium ml-4">專案:</span>' +
                '<select class="form-select" style="width:150px" onchange="filterPayables(null,null,this.value,null)">' + 
                projectIds.map(function(pid) {
                    var selected = state.payablesProject === pid ? 'selected' : '';
                    var label = pid === 'all' ? '全部專案' : pid;
                    var count = pid === 'all' ? state.data.payables.length : state.data.payables.filter(function(p) { return p.projectId === pid; }).length;
                    return '<option value="' + pid + '" ' + selected + '>' + label + ' (' + count + ')</option>';
                }).join('') + '</select>' +
                // 專案預算顯示（只有選擇特定專案時顯示）
                (function() {
                    if (state.payablesProject === 'all') return '';
                    var pid = state.payablesProject;
                    var budget = (state.data.projectBudgets || {})[pid] || 0;
                    if (budget <= 0) return '<span class="text-xs text-slate-400 ml-2"><i class="fas fa-info-circle mr-1"></i>未設定預算</span>';
                    
                    // 計算已使用預算（該專案所有應付帳款，不論狀態）
                    var usedBudget = state.data.payables.filter(function(p) { return p.projectId === pid; })
                        .reduce(function(s, p) { return s + safeAmount(p.amount); }, 0);
                    var remaining = budget - usedBudget;
                    var usedPercent = budget > 0 ? Math.round(usedBudget / budget * 100) : 0;
                    var isOver = remaining < 0;
                    
                    return '<div class="ml-4 px-3 py-1 rounded" style="background:' + (isOver ? '#fef2f2' : '#f0fdf4') + ';border:1px solid ' + (isOver ? '#fecaca' : '#bbf7d0') + '">' +
                        '<span class="text-xs font-medium" style="color:' + (isOver ? '#dc2626' : '#16a34a') + '">' +
                        '<i class="fas fa-' + (isOver ? 'exclamation-triangle' : 'chart-pie') + ' mr-1"></i>' +
                        '預算: ' + formatCurrency(budget) + ' | 已用: ' + formatCurrency(usedBudget) + ' (' + usedPercent + '%) | ' +
                        (isOver ? '超支: ' : '剩餘: ') + formatCurrency(Math.abs(remaining)) +
                        '</span></div>';
                })() +
                '<span class="text-sm font-medium ml-4">付款方式:</span>' +
                '<select class="form-select" style="width:120px" onchange="filterPayables(null,null,null,this.value)">' + paymentOptions + '</select>' +
                '</div>' +
                // 搜尋框和批次操作
                '<div class="flex justify-between items-center mt-3 pt-3 border-t">' +
                '<div class="flex items-center gap-4">' +
                '<div class="flex items-center gap-2">' +
                '<i class="fas fa-search text-slate-400"></i>' +
                '<input type="text" class="form-input text-sm py-1" style="width:200px" placeholder="搜尋供應商/說明/發票..." value="' + (state.payablesSearch || '') + '" onkeyup="searchPayables(this.value)">' +
                '</div>' +
                (state.selectedPayables.length > 0 ? 
                '<div class="flex items-center gap-2 bg-blue-50 px-3 py-1 rounded">' +
                '<span class="text-sm text-blue-600">已選 ' + state.selectedPayables.length + ' 筆</span>' +
                '<button class="btn btn-sm btn-success" onclick="batchMarkPaid()"><i class="fas fa-check mr-1"></i>批次標記已付款</button>' +
                '<button class="btn btn-sm btn-danger" onclick="batchDeletePayables()"><i class="fas fa-trash mr-1"></i>批次刪除</button>' +
                '<button class="btn btn-sm" onclick="clearSelectedPayables()"><i class="fas fa-times"></i></button>' +
                '</div>' : '') +
                '</div>' +
                (catBadges ? '<div>' + catBadges + '</div>' : '') +
                '</div>' +
                '</div>' +
                
                // 每月分類彙總表（可收縮）
                '<div class="card mb-4">' +
                '<div class="p-3 bg-slate-50 border-b flex justify-between items-center cursor-pointer" onclick="toggleExpenseSummary()">' +
                '<h4 class="font-bold"><i class="fas fa-chart-bar mr-2 text-blue-500"></i>每月營業費用</h4>' +
                '<button class="btn btn-sm"><i class="fas fa-chevron-' + (state.expenseSummaryCollapsed ? 'down' : 'up') + '"></i></button>' +
                '</div>' +
                (state.expenseSummaryCollapsed ? '' : 
                '<div class="p-4 overflow-x-auto">' +
                '<table class="text-sm"><thead><tr class="bg-slate-50">' + summaryHeader + '</tr></thead>' +
                '<tbody>' + summaryRows + '</tbody></table></div>') +

                // 明細表格
                '<div class="card overflow-x-auto">' +
                '<div class="p-3 bg-slate-50 border-b flex justify-between items-center">' +
                '<h4 class="font-bold"><i class="fas fa-list mr-2"></i>費用明細 (' + filtered.length + '筆)</h4>' +
                '</div>' +
                '<div id="ap-table-scroll" style="max-height:650px;overflow-y:auto">' +
                '<table class="text-sm"><thead class="sticky top-0 bg-white"><tr>' +
                '<th style="width:30px"><input type="checkbox" onclick="toggleAllPayables(this.checked)" title="全選"></th><th>編號</th><th>月份</th><th>預計付款</th><th>分類</th><th>廠商編碼</th><th>供應商/項目</th><th>專案</th><th>發票編號</th><th>說明</th><th>付款方式</th><th class="text-right">金額</th><th>狀態</th><th>操作</th>' +
                '</tr></thead><tbody>' + rows + '</tbody></table></div></div></div>';
        }
        
        function filterPayables(month, category, project, payment) {
            if (month !== null) state.payablesMonth = month;
            if (category !== null) state.payablesCategory = category;
            if (project !== null) state.payablesProject = project;
            if (payment !== null) state.payablesPayment = payment;
            render(true);
        }
        
        // 切換每月營業費用收縮狀態
        function toggleExpenseSummary() {
            state.expenseSummaryCollapsed = !state.expenseSummaryCollapsed;
            render(true);
        }
        
        // 應付帳款搜尋
        function searchPayables(term) {
            state.payablesSearch = term;
            render(true);
        }
        
        // 切換單筆應付帳款選擇
        function toggleSelectPayable(idx) {
            var pos = state.selectedPayables.indexOf(idx);
            if (pos >= 0) {
                state.selectedPayables.splice(pos, 1);
            } else {
                state.selectedPayables.push(idx);
            }
            render(true);
        }
        
        // 全選/取消全選應付帳款
        function toggleAllPayables(checked) {
            if (checked) {
                var paySearchTerm = (state.payablesSearch || '').toLowerCase();
                state.selectedPayables = [];
                state.data.payables.forEach(function(p, idx) {
                    var monthMatch = state.payablesMonth === 'all' || getMonthFromDate(p.date) === state.payablesMonth;
                    var catMatch = state.payablesCategory === 'all' || p.category === state.payablesCategory;
                    var projMatch = state.payablesProject === 'all' || p.projectId === state.payablesProject;
                    var payMatch = state.payablesPayment === 'all' || p.paymentMethod === state.payablesPayment;
                    var searchMatch = !paySearchTerm || 
                        (p.vendor && p.vendor.toLowerCase().indexOf(paySearchTerm) >= 0) ||
                        (p.description && p.description.toLowerCase().indexOf(paySearchTerm) >= 0);
                    if (monthMatch && catMatch && projMatch && payMatch && searchMatch) {
                        state.selectedPayables.push(idx);
                    }
                });
            } else {
                state.selectedPayables = [];
            }
            render(true);
        }
        
        // 清除應付帳款選擇
        function clearSelectedPayables() {
            state.selectedPayables = [];
            render(true);
        }
        
        // 批次標記已付款
        function batchMarkPaid() {
            if (state.selectedPayables.length === 0) return;
            var count = 0;
            state.selectedPayables.forEach(function(idx) {
                if (state.data.payables[idx] && state.data.payables[idx].status === '待付款') {
                    state.data.payables[idx].status = '已付款';
                    count++;
                }
            });
            if (count > 0) {
                saveData();
                showToast('✅ 已將 ' + count + ' 筆標記為已付款', 'success');
            }
            state.selectedPayables = [];
            render(true);
        }
        
        // 批次刪除應付帳款
        function batchDeletePayables() {
            if (state.selectedPayables.length === 0) return;
            if (!confirm('確定要刪除選中的 ' + state.selectedPayables.length + ' 筆應付帳款？此操作無法復原。')) return;
            var sorted = state.selectedPayables.slice().sort(function(a, b) { return b - a; });
            sorted.forEach(function(idx) {
                state.data.payables.splice(idx, 1);
            });
            saveData();
            state.selectedPayables = [];
            render(true);
        }
        
        // 列印應付帳款
        function printPayables() {
            var printWindow = window.open('', '_blank');
            printWindow.document.write('<html><head><title>應付帳款明細 - ' + state.data.company.name + '</title>');
            printWindow.document.write('<style>body{font-family:sans-serif;padding:20px}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border:1px solid #ddd;padding:6px;text-align:left}th{background:#1e293b;color:white}.text-right{text-align:right}.font-bold{font-weight:bold}.badge{padding:2px 6px;border-radius:4px;font-size:10px}.badge-green{background:#dcfce7;color:#166534}.badge-yellow{background:#fef3c7;color:#92400e}.badge-blue{background:#dbeafe;color:#1e40af}@media print{.no-print{display:none!important}}</style>');
            printWindow.document.write('</head><body>');
            printWindow.document.write('<h1>' + state.data.company.name + '</h1>');
            printWindow.document.write('<h2>應付帳款明細</h2>');
            printWindow.document.write('<p>列印日期: ' + new Date().toLocaleDateString('zh-TW') + '</p>');
            
            var tableHtml = '<table><thead><tr><th>編號</th><th>月份</th><th>分類</th><th>供應商</th><th>專案</th><th>發票編號</th><th>說明</th><th class="text-right">金額</th><th>狀態</th></tr></thead><tbody>';
            
            var paySearchTerm = (state.payablesSearch || '').toLowerCase();
            var total = 0;
            state.data.payables.forEach(function(p) {
                var monthMatch = state.payablesMonth === 'all' || getMonthFromDate(p.date) === state.payablesMonth;
                var catMatch = state.payablesCategory === 'all' || p.category === state.payablesCategory;
                var projMatch = state.payablesProject === 'all' || p.projectId === state.payablesProject;
                var payMatch = state.payablesPayment === 'all' || p.paymentMethod === state.payablesPayment;
                var searchMatch = !paySearchTerm || 
                    (p.vendor && p.vendor.toLowerCase().indexOf(paySearchTerm) >= 0) ||
                    (p.description && p.description.toLowerCase().indexOf(paySearchTerm) >= 0);
                if (monthMatch && catMatch && projMatch && payMatch && searchMatch) {
                    var statusClass = p.status === '已付款' ? 'badge-green' : 'badge-yellow';
                    tableHtml += '<tr><td>' + p.id + '</td><td>' + (p.date || '-') + '</td><td><span class="badge badge-blue">' + p.category + '</span></td><td>' + p.vendor + '</td><td>' + (p.projectId || '-') + '</td><td>' + (p.invoiceNo || '-') + '</td><td>' + (p.description || '-') + '</td><td class="text-right">' + formatCurrency(p.amount) + '</td><td><span class="badge ' + statusClass + '">' + p.status + '</span></td></tr>';
                    total += p.amount;
                }
            });
            tableHtml += '<tr class="font-bold"><td colspan="7">合計</td><td class="text-right">' + formatCurrency(total) + '</td><td></td></tr>';
            tableHtml += '</tbody></table>';
            
            printWindow.document.write(tableHtml);
            printWindow.document.write('</body></html>');
            printWindow.document.close();
            printWindow.print();
        }
        
        
        function renderCustomers() {
            // 計算客戶統計
            var totalCustomers = (state.data.customers || []).length;
            var totalAR = 0;
            var totalReceived = 0;
            var totalPending = 0;
            
            // 客戶明細
            var rows = (state.data.customers || []).map(function(c, idx) {
                // 該客戶的應收帳款
                var custAR = state.data.receivables.filter(function(r) { return r.customerCode === c.code; });
                var custTotal = custAR.reduce(function(s, r) { return s + safeAmount(r.amount); }, 0);
                var custReceived = custAR.filter(function(r) { return r.status === '已收款'; }).reduce(function(s, r) { return s + safeAmount(r.amount); }, 0);
                var custPending = custAR.filter(function(r) { return r.status === '待收款'; }).reduce(function(s, r) { return s + safeAmount(r.amount); }, 0);
                
                totalAR += custTotal;
                totalReceived += custReceived;
                totalPending += custPending;
                
                var receivedRate = custTotal > 0 ? ((custReceived / custTotal) * 100).toFixed(0) : 0;
                var invoiceBadge = c.invoice === '有' ? '<span class="badge badge-green">有</span>' : '<span class="badge badge-gray">無</span>';
                
                return '<tr class="cursor-pointer hover:bg-slate-50" onclick="toggleCustomerDetail(' + idx + ')">' +
                    '<td class="text-xs text-slate-400">' + c.code + '</td>' +
                    '<td class="font-medium">' + c.shortName + '</td>' +
                    '<td class="text-sm text-slate-600">' + (c.name || '') + '</td>' +

        // ========== 獎金結算系統 ==========
        // 新制效率獎勵制度
        // 獎金 = (營收 - 直接成本 - 營業成本14%) × 比例
        // 工期越短獎金比例越高
        
        var BONUS_RATES = [
            { maxDays: 30, rate: 0.35, label: '≤30天 (35%)' },
            { maxDays: 60, rate: 0.30, label: '31-60天 (30%)' },
            { maxDays: 90, rate: 0.25, label: '61-90天 (25%)' },
            { maxDays: 120, rate: 0.20, label: '91-120天 (20%)' },
            { maxDays: 9999, rate: 0.15, label: '>120天 (15%)' }
        ];
        
        var OPERATING_COST_RATE = 0.14; // 營業成本率 14%
        
        // 計算獎金比例
        function getBonusRate(workDays) {
            for (var i = 0; i < BONUS_RATES.length; i++) {
                if (workDays <= BONUS_RATES[i].maxDays) {
                    return BONUS_RATES[i];
                }
            }
            return BONUS_RATES[BONUS_RATES.length - 1];
        }
        
        // 計算專案獎金
        function calculateProjectBonus(project, workDays) {
            var revenue = project.revenue || 0;
            
            // 計算直接成本（從應付帳款勾稽）
            var directCost = (state.data.payables || [])
                .filter(function(p) { return p.projectId === project.id; })
                .reduce(function(s, p) { return s + (p.amount || 0); }, 0);
            
            var grossProfit = revenue - directCost;
            var grossProfitRate = revenue > 0 ? (grossProfit / revenue * 100) : 0;
            
            var operatingCost = revenue * OPERATING_COST_RATE;
            var netProfit = grossProfit - operatingCost;
            var netProfitRate = revenue > 0 ? (netProfit / revenue * 100) : 0;
            
            var bonusRateInfo = getBonusRate(workDays);
            var bonus = netProfit > 0 ? netProfit * bonusRateInfo.rate : 0;
            var companyProfit = netProfit - bonus;
            
            return {
                revenue: revenue,
                directCost: directCost,
                grossProfit: grossProfit,
                grossProfitRate: grossProfitRate,
                operatingCost: operatingCost,
                netProfit: netProfit,
                netProfitRate: netProfitRate,
                workDays: workDays,
                bonusRate: bonusRateInfo.rate,
                bonusRateLabel: bonusRateInfo.label,
                bonus: bonus,
                companyProfit: companyProfit
            };
        }

            var newId = 'AP' + String(maxId + 1).padStart(4, '0');
            
            var payable = {

                status: '待付款',
                dueDate: '',

            settlements.forEach(function(s) {

                    s.settlementDate,

        function renderProjects() {
            // 計算統計 - 從應付帳款勾稽成本
            var totalRevenue = state.data.projects.reduce(function(s, p) { return s + p.revenue; }, 0);
            
            // 計算每個專案的成本（從應付帳款勾稽）
            var projectCostsMap = {};
            state.data.payables.forEach(function(ap) {
                if (ap.projectId) {
                    if (!projectCostsMap[ap.projectId]) projectCostsMap[ap.projectId] = { total: 0, items: [] };
                    projectCostsMap[ap.projectId].total += ap.amount;
                    projectCostsMap[ap.projectId].items.push(ap);
                }
            });
            
            var totalCosts = Object.keys(projectCostsMap).reduce(function(s, pid) {
                return s + projectCostsMap[pid].total;
            }, 0);
            var totalProfit = totalRevenue - totalCosts;
            var completedCount = state.data.projects.filter(function(p) { return p.status === '已完成'; }).length;
            var activeCount = state.data.projects.filter(function(p) { return p.status === '進行中'; }).length;
            
            // 按客戶分組
            var byCustomer = {};
            state.data.projects.forEach(function(p) {
                if (!byCustomer[p.customer]) byCustomer[p.customer] = { revenue: 0, count: 0 };
                byCustomer[p.customer].revenue += p.revenue;
                byCustomer[p.customer].count++;
            });
            
            var customerBadges = '';
            Object.keys(byCustomer).sort(function(a,b) { return byCustomer[b].revenue - byCustomer[a].revenue; }).forEach(function(c) {
                customerBadges += '<span class="inline-block mr-3 mb-2"><span class="badge badge-blue">' + c.replace('股份有限公司','').replace('有限公司','') + '</span> ' + formatCurrency(byCustomer[c].revenue) + ' <span class="text-xs text-slate-400">(' + byCustomer[c].count + '案)</span></span>';
            });
            
            // 專案列表（含成本明細）
            var rows = state.data.projects.map(function(p, idx) {
                // 從應付帳款勾稽成本

        // 專案損益分析
        function showProjectProfitAnalysis() {
            var projects = state.data.projects || [];
            var payables = state.data.payables || [];
            
            // 計算每個專案的成本
            var projectCostsMap = {};
            payables.forEach(function(ap) {
                if (ap.projectId) {
                    if (!projectCostsMap[ap.projectId]) projectCostsMap[ap.projectId] = 0;
                    projectCostsMap[ap.projectId] += ap.amount || 0;
                }
            });
            
            // 準備分析資料
            var analysisData = projects.map(function(p) {
                var cost = projectCostsMap[p.id] || 0;
                var profit = p.revenue - cost;
                var profitRate = p.revenue > 0 ? (profit / p.revenue * 100) : 0;
                return {
                    id: p.id,
                    name: p.name.substring(0, 20) + (p.name.length > 20 ? '...' : ''),
                    customer: (p.customer || '').replace('股份有限公司', '').replace('有限公司', ''),
                    revenue: p.revenue,
                    cost: cost,
                    profit: profit,
                    profitRate: profitRate,
                    status: p.status
                };
            });
            
            // 按毛利率排序
            analysisData.sort(function(a, b) { return b.profitRate - a.profitRate; });
            
            // 總計
            var totalRevenue = analysisData.reduce(function(s, p) { return s + p.revenue; }, 0);
            var totalCost = analysisData.reduce(function(s, p) { return s + p.cost; }, 0);
            var totalProfit = totalRevenue - totalCost;
            var avgProfitRate = totalRevenue > 0 ? (totalProfit / totalRevenue * 100) : 0;
            
            // 毛利率分布統計
            var rateDistribution = { high: 0, medium: 0, low: 0, negative: 0 };
            analysisData.forEach(function(p) {
                if (p.profitRate >= 30) rateDistribution.high++;
                else if (p.profitRate >= 15) rateDistribution.medium++;
                else if (p.profitRate >= 0) rateDistribution.low++;
                else rateDistribution.negative++;
            });
            
            // 表格行
            var rows = analysisData.map(function(p, idx) {
                var profitColor = p.profit >= 0 ? 'text-green-600' : 'text-red-600';
                var rateColor = p.profitRate >= 30 ? 'text-green-600' : (p.profitRate >= 15 ? 'text-blue-600' : (p.profitRate >= 0 ? 'text-yellow-600' : 'text-red-600'));
                var barWidth = Math.min(Math.abs(p.profitRate), 50);
                var barColor = p.profitRate >= 0 ? '#22c55e' : '#ef4444';
                
                return '<tr class="hover:bg-slate-50">' +
                    '<td class="text-center">' + (idx + 1) + '</td>' +
                    '<td class="text-xs text-slate-400">' + p.id + '</td>' +
                    '<td>' + p.name + '</td>' +
                    '<td class="text-sm">' + p.customer + '</td>' +
                    '<td class="text-right">' + formatCurrency(p.revenue) + '</td>' +
                    '<td class="text-right text-red-500">' + formatCurrency(p.cost) + '</td>' +
                    '<td class="text-right font-medium ' + profitColor + '">' + formatCurrency(p.profit) + '</td>' +
                    '<td style="width:120px">' +
                    '<div class="flex items-center gap-2">' +
                    '<div style="width:50px;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden">' +
                    '<div style="width:' + barWidth + '%;height:100%;background:' + barColor + '"></div></div>' +
                    '<span class="' + rateColor + ' font-medium">' + p.profitRate.toFixed(1) + '%</span>' +
                    '</div></td>' +
                    '</tr>';
            }).join('');
            
            state.modal = '<div class="modal-header"><h3 class="font-bold"><i class="fas fa-chart-pie mr-2" style="color:#8b5cf6"></i>專案損益分析</h3>' +
                '<button onclick="closeModal()" class="text-slate-500"><i class="fas fa-times"></i></button></div>' +
                '<div style="max-height:75vh;overflow-y:auto">' +
                
                // 總覽統計
                '<div class="grid grid-cols-4 gap-3 mb-4">' +
                '<div class="p-3 bg-blue-50 rounded-lg text-center">' +
                '<div class="text-xl font-bold text-blue-600">' + formatCurrency(totalRevenue) + '</div>' +
                '<div class="text-xs text-slate-500">總營收</div></div>' +
                '<div class="p-3 bg-red-50 rounded-lg text-center">' +
                '<div class="text-xl font-bold text-red-500">' + formatCurrency(totalCost) + '</div>' +
                '<div class="text-xs text-slate-500">總成本</div></div>' +
                '<div class="p-3 bg-green-50 rounded-lg text-center">' +
                '<div class="text-xl font-bold text-green-600">' + formatCurrency(totalProfit) + '</div>' +
                '<div class="text-xs text-slate-500">總毛利</div></div>' +
                '<div class="p-3 bg-purple-50 rounded-lg text-center">' +
                '<div class="text-xl font-bold text-purple-600">' + avgProfitRate.toFixed(1) + '%</div>' +
                '<div class="text-xs text-slate-500">平均毛利率</div></div>' +
                '</div>' +
                
                // 毛利率分布
                '<div class="p-3 bg-slate-50 rounded-lg mb-4">' +
                '<div class="font-bold mb-2"><i class="fas fa-chart-bar mr-2 text-purple-500"></i>毛利率分布</div>' +
                '<div class="flex gap-4">' +
                '<div class="flex items-center gap-2"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px"></span><span class="text-sm">≥30%: ' + rateDistribution.high + '案</span></div>' +
                '<div class="flex items-center gap-2"><span style="width:12px;height:12px;background:#3b82f6;border-radius:2px"></span><span class="text-sm">15-30%: ' + rateDistribution.medium + '案</span></div>' +
                '<div class="flex items-center gap-2"><span style="width:12px;height:12px;background:#f59e0b;border-radius:2px"></span><span class="text-sm">0-15%: ' + rateDistribution.low + '案</span></div>' +
                '<div class="flex items-center gap-2"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px"></span><span class="text-sm"><0%: ' + rateDistribution.negative + '案</span></div>' +
                '</div></div>' +
                
                // 專案明細表
                '<div style="max-height:350px;overflow-y:auto">' +
                '<table class="text-sm w-full"><thead class="sticky top-0 bg-white"><tr>' +
                '<th class="p-2 text-center" style="width:40px">排名</th>' +

                '<th class="p-2 text-right">營收</th>' +
                '<th class="p-2 text-right">成本</th>' +
                '<th class="p-2 text-right">毛利</th>' +
                '<th class="p-2">毛利率</th>' +
                '</tr></thead><tbody>' + rows + '</tbody></table></div>' +
                
                '<div class="flex gap-2 mt-4">' +
                '<button class="btn btn-secondary flex-1" onclick="closeModal()">關閉</button>' +
                '</div></div>';
            
            render();
        }

        function saveEditProject(idx) {
            var p = state.data.projects[idx];
            var oldId = p.id;
            var newId = document.getElementById('edit-proj-id').value;
            var oldCustomerCode = p.customerCode;
            
            p.id = newId;
            p.date = document.getElementById('edit-proj-date').value;
            p.customerCode = document.getElementById('edit-proj-customer-code').value;
            p.customer = document.getElementById('edit-proj-customer').value;
            p.name = document.getElementById('edit-proj-name').value;
            p.revenue = Number(document.getElementById('edit-proj-revenue').value) || 0;
            p.status = document.getElementById('edit-proj-status').value;
            
            // 發票設定從客戶取得（綁定客戶管理）
            var customer = (state.data.customers || []).find(function(c) { return c.code === p.customerCode; });
            p.invoice = customer ? (customer.invoice || '無') : '無';
            
            // 如果專案編號改變，更新關聯的應收應付帳款
            if (oldId !== newId) {
                state.data.payables.forEach(function(ap) {
                    if (ap.projectId === oldId) {
                        ap.projectId = newId;
                        ap.project = p.name;
                    }
                });
                state.data.receivables.forEach(function(ar) {
                    if (ar.projectId === oldId) {
                        ar.projectId = newId;
                        ar.project = p.name;
                    }
                });
            }
            
            // 如果客戶改變，更新應收帳款的發票狀態和付款方式
            if (oldCustomerCode !== p.customerCode || oldId !== newId) {
                var paymentMethod = p.invoice === '有' ? '匯款' : '現金';
                state.data.receivables.forEach(function(ar) {
                    if (ar.projectId === p.id || ar.projectId === oldId) {
                        ar.invoice = p.invoice;
                        ar.paymentMethod = paymentMethod;
                    }
                });
                // 更新應付帳款的付款方式
                state.data.payables.forEach(function(ap) {
                    if (ap.projectId === p.id || ap.projectId === oldId) {
                        ap.paymentMethod = paymentMethod;
                    }
                });
            }
            
            saveData();
            render(true);
            closeModal();
        }

        function deleteProject(idx) {
            var p = state.data.projects[idx];
            
            // 檢查是否有關聯的應收應付帳款
            var linkedAP = state.data.payables.filter(function(ap) { return ap.projectId === p.id; });
            var linkedAR = state.data.receivables.filter(function(ar) { return ar.projectId === p.id; });
            
            var msg = '確定刪除專案「' + p.name + '」？';
            if (linkedAP.length > 0 || linkedAR.length > 0) {
                msg += '\n\n此專案有 ' + linkedAP.length + ' 筆應付帳款、' + linkedAR.length + ' 筆應收帳款關聯。\n刪除專案不會刪除這些帳款，但會解除關聯。';
            }
            
            if (confirm(msg)) {
                // 解除關聯（清空 projectId）
                state.data.payables.forEach(function(ap) {
                    if (ap.projectId === p.id) {
                        ap.projectId = '';
                    }
                });
                state.data.receivables.forEach(function(ar) {
                    if (ar.projectId === p.id) {
                        ar.projectId = '';
                    }
                });
                
                state.data.projects.splice(idx, 1);
                saveData();
                render();
            }
        }
        
        // ========== 從報價系統匯入 ==========
        // 核心解析函數：接收已解析的 data 物件，顯示匯入預覽
        function _processQuoteData(data) {
            var formValues = data.formValues || {};
            var costItems = data.costItems || [];
            var projectDiscount = data.projectDiscount || {};

            // 計算總報價金額
            var totalCost = 0;
            var totalQuote = 0;
            costItems.forEach(function(item) {
                var base = item.baseCost || (item.costUnitPrice * item.qty);
                var hardware = (item.drawers || 0) * 1200 + (item.handles || 0) * 350 + (item.pullouts || 0) * 1100 + (item.shelves || 0) * 750;
                var itemCost = base + hardware;
                var itemQuote = Math.round(itemCost * (item.profitRate || 1.3));
                totalCost += itemCost;
                totalQuote += itemQuote;
            });

            var mgmtRate = formValues.mgmtRate || 0.07;
            var taxRate = formValues.taxRate || 0.05;
            var mgmtFee = Math.round(totalQuote * mgmtRate);
            var totalWithMgmt = totalQuote + mgmtFee;
            var tax = Math.round(totalWithMgmt * taxRate);
            var grandTotal = totalWithMgmt + tax;

            if (projectDiscount.useDiscountPrice && projectDiscount.projectDiscountPrice > 0) {
                grandTotal = projectDiscount.projectDiscountPrice;
            }

            var projectCode = formValues.projectCode || 'P00';
            var existingProject = state.data.projects.find(function(p) { return p.id === projectCode; });
