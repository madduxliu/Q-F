        function executeImportFromQuote() {
            var quoteData = state.pendingQuoteImport;
            var summary = state.pendingQuoteSummary;
            if (!quoteData || !summary) {
                showToast('❌ 匯入資料遺失，請重新操作', 'error');
                closeModal();
                return;
            }
            
            var formValues = quoteData.formValues || {};
            var costItems = quoteData.costItems || [];
            
            // 1. 建立或更新客戶
            var customerName = formValues.customer || '未命名客戶';
            var existingCustomer = (state.data.customers || []).find(function(c) {
                return c.name === customerName || c.shortName === customerName;
            });
            
            var customerCode;
            if (existingCustomer) {
                customerCode = existingCustomer.code;
            } else {
                // 新增客戶
                var maxCode = 0;
                (state.data.customers || []).forEach(function(c) {
                    var num = parseInt(c.code.replace('C', ''));
                    if (num > maxCode) maxCode = num;
                });
                customerCode = 'C' + String(maxCode + 1).padStart(3, '0');
                state.data.customers.push({
                    code: customerCode,
                    name: customerName,
                    shortName: customerName.substring(0, 10),
                    contact: '',
                    phone: formValues.customerPhone || '',
                    email: '',
                    paymentTerms: '依合約',
                    invoice: '有'
                });
            }
            
            // 2. 建立或更新專案
            var projectCode = formValues.projectCode || 'P00';
            var projectName = (formValues.projectName || '未命名專案');
            var fullProjectName = customerName.replace('股份有限公司','').replace('有限公司','') + '-' + projectName;
            
            // 取得專案資訊（含發票設定和工期）
            var projectInfo = quoteData.project || {};
            var invoiceSetting = projectInfo.invoice || formValues.projectInvoice || '有';
            var paymentMethod = invoiceSetting === '有' ? '匯款' : '現金';
            var startDateStr = projectInfo.startDate || '';
            var endDateStr = projectInfo.endDate || '';
            
            var existingProjectIdx = state.data.projects.findIndex(function(p) { return p.id === projectCode; });
            var today = new Date();
            var dateStr = (today.getFullYear() - 1911) + '.' + String(today.getMonth() + 1).padStart(2, '0');
            
            // 取得成本明細
            var costDetails = quoteData.costDetails || [];
            
            var projectData = {
                id: projectCode,
                date: dateStr,
                customer: customerName,
                customerCode: customerCode,
                name: fullProjectName,
                revenue: summary.grandTotal,
                costs: summary.totalCost,
                profit: summary.grandTotal - summary.totalCost,
                status: '進行中',
                invoice: invoiceSetting,
                location: formValues.location || '',
                startDate: startDateStr,
                endDate: endDateStr,
                costDetails: costDetails
            };
            
            if (existingProjectIdx >= 0) {
                state.data.projects[existingProjectIdx] = projectData;
            } else {
                state.data.projects.push(projectData);
            }
            
            // 3. 建立應收帳款（使用報價系統設定的付款階段）
            var quotePaymentStages = quoteData.paymentStages || [];
            var stages = quotePaymentStages.length > 0 ? 
                quotePaymentStages.map(function(s) {
                    return { desc: s.description || s.stage || '', ratio: s.ratio || 0, note: s.note || '' };
                }) : [
                    { desc: '簽約後進場前', ratio: 0.3, note: '' },
                    { desc: '木工封板完成', ratio: 0.3, note: '' },
                    { desc: '櫃體完成', ratio: 0.3, note: '' },
                    { desc: '驗收', ratio: 0.1, note: '' }
                ];
            
            // 計算預計收款日（根據工期均勻分配）
            var projectStartDate = startDateStr ? new Date(startDateStr.replace(/^(\d+)-/, function(m, y) { 
                return (parseInt(y) > 200 ? y : parseInt(y) + 1911) + '-'; 
            })) : new Date();
            var projectEndDate = endDateStr ? new Date(endDateStr.replace(/^(\d+)-/, function(m, y) { 
                return (parseInt(y) > 200 ? y : parseInt(y) + 1911) + '-'; 
            })) : new Date(projectStartDate.getTime() + 90 * 24 * 60 * 60 * 1000);
            
            var totalDays = Math.max(30, Math.ceil((projectEndDate - projectStartDate) / (1000 * 60 * 60 * 24)));
            
            var arMaxId = 0;
            state.data.receivables.forEach(function(r) {
                var num = parseInt(r.id.replace('AR', ''));
                if (num > arMaxId) arMaxId = num;
            });
            
            var cumulativeRatio = 0;
            stages.forEach(function(stage, i) {
                arMaxId++;
                var amount = Math.round(summary.grandTotal * stage.ratio);
                
                // 計算預計收款日（依比例累計）
                cumulativeRatio += stage.ratio;
                var daysFromStart = Math.round(totalDays * cumulativeRatio);
                var expectedDate = new Date(projectStartDate.getTime() + daysFromStart * 24 * 60 * 60 * 1000);
                var expectedDateStr = expectedDate.toISOString().split('T')[0];
                
                state.data.receivables.push({
                    id: 'AR' + String(arMaxId).padStart(4, '0'),
                    date: dateStr,
                    dueDate: expectedDateStr,
                    expectedDate: expectedDateStr,
                    customer: customerName,
                    customerCode: customerCode,
                    description: projectCode + ' ' + stage.desc + ' (' + Math.round(stage.ratio * 100) + '%)',
                    amount: amount,
                    invoice: invoiceSetting,
                    paymentMethod: paymentMethod,
                    status: '待收款',
                    projectId: projectCode
                });
            });
            
            // 4. 同步供應商資料
            var quoteVendors = quoteData.suppliers || quoteData.vendors || [];
            var categoryVendorDefaults = quoteData.categoryVendors || quoteData.categoryVendorDefaults || {};
            var itemVendors = quoteData.itemVendors || {};
            var newVendorCount = 0;
            
            // 先同步供應商清單
            if (!state.data.suppliers) state.data.suppliers = []; // ★★★ Build 33: 確保陣列存在 ★★★
            quoteVendors.forEach(function(qv) {
                var existingSupplier = (state.data.suppliers || []).find(function(s) {
                    return s.code === qv.code || s.name === qv.name;
                });

                if (!existingSupplier) {
                    // 新增供應商
                    state.data.suppliers.push({
                        code: qv.code,
                        name: qv.name,
                        shortName: qv.shortName || qv.name,
                        category: qv.category || '其他',
                        paymentMethod: qv.paymentMethod || '匯款'
                    });
                    newVendorCount++;
                }
            });
            
            // 5. 建立應付帳款（按供應商分組）
            var categoryNames = {
                1: '準備工程', 2: '木作工程', 3: '泥作工程', 4: '玻璃工程',
                5: '金屬工程', 6: '水電工程', 7: '塗料工程', 8: '空調工程',
                9: '收尾工程', 10: '軟裝工程'
            };
            
            // 對應工種到應付帳款分類
            var catToApCategory = {
                '準備工程': '外包工程',
                '木作工程': '外包工程',
                '泥作工程': '外包工程',
                '玻璃工程': '原物料',
                '金屬工程': '外包工程',
                '水電工程': '外包工程',
                '塗料工程': '外包工程',
                '空調工程': '設備採購',
                '收尾工程': '外包工程',
                '軟裝工程': '原物料'
            };
            
            // 按供應商分組成本項目
            var byVendor = {};
            costItems.forEach(function(item) {
                // 取得供應商：優先使用項目指定的，其次使用工種預設的
                var vendorCode = itemVendors[item.id] || item.vendorCode || categoryVendorDefaults[item.categoryId] || '';
                var vendor = quoteVendors.find(function(v) { return v.code === vendorCode; });
                var catName = categoryNames[item.categoryId] || '其他';
                
                var key = vendorCode || 'unassigned_' + item.categoryId;
                if (!byVendor[key]) {
                    byVendor[key] = {
                        vendorCode: vendorCode,
                        vendorName: vendor ? vendor.name : '',
                        vendorShort: vendor ? vendor.shortName : catName + '廠商',
                        category: catToApCategory[catName] || '外包工程',
                        items: [],
                        total: 0
                    };
                }
                
                var base = item.baseCost || (item.costUnitPrice * item.qty);
                var hardware = (item.drawers || 0) * 1200 + (item.handles || 0) * 350 + (item.pullouts || 0) * 1100 + (item.shelves || 0) * 750;
                var itemCost = base + hardware;
                byVendor[key].items.push(item);
                byVendor[key].total += itemCost;
            });
            
            var apMaxId = 0;
            state.data.payables.forEach(function(p) {
                var num = parseInt(p.id.replace('AP', ''));
                if (num > apMaxId) apMaxId = num;
            });
            
            var apCount = 0;
            Object.keys(byVendor).forEach(function(key) {
                apMaxId++;
                apCount++;
                var vData = byVendor[key];
                var itemNames = vData.items.slice(0, 3).map(function(it) { return it.name; }).join('、');
                if (vData.items.length > 3) itemNames += '...等' + vData.items.length + '項';
                
                state.data.payables.push({
                    id: 'AP' + String(apMaxId).padStart(4, '0'),
                    date: dateStr,
                    dueDate: '', // 應付帳款到期日（後續可手動設定）
                    category: vData.category,
                    vendorCode: vData.vendorCode,
                    vendor: vData.vendorName || vData.vendorShort,
                    invoiceNo: '',
                    description: projectCode + '：' + itemNames,
                    amount: vData.total,
                    paymentMethod: '匯款',
                    status: '待付款',
                    projectId: projectCode
                });
            });
            
            // 6. 設定專案工程預算上限（應付帳款總額作為預算上限）
            var totalApAmount = 0;
            Object.keys(byVendor).forEach(function(key) {
                totalApAmount += byVendor[key].total;
            });
            if (!state.data.projectBudgets) state.data.projectBudgets = {};
            state.data.projectBudgets[projectCode] = totalApAmount;
            
            // 儲存並關閉
            state.pendingQuoteImport = null;
            state.pendingQuoteSummary = null;

            // 清除同步信號（標記為已處理，防止重複匯入）
            try {
                localStorage.removeItem('fangwei_quote_export');
                localStorage.removeItem('fangwei_sync_signal');
                var syncTimestamp = new Date().toISOString();
                localStorage.setItem('fangwei_last_processed_sync', syncTimestamp);
            } catch (e) { console.warn('⚠️ 清除同步信號失敗:', e); }

            // ★★★ 清除 Firebase 上的匯出信號（避免其他裝置重複偵測）★★★

        function renderVendors() {
            // 使用 suppliers 資料表
            var suppliers = state.data.suppliers || [];

            // ★ Build 34: 依代碼排序（由小到大）
            suppliers.sort(function(a, b) {
                var codeA = (a.code || '').replace(/[^0-9]/g, '');
                var codeB = (b.code || '').replace(/[^0-9]/g, '');
                var numA = parseInt(codeA, 10) || 0;
                var numB = parseInt(codeB, 10) || 0;
                if (numA !== numB) return numA - numB;
                return (a.code || '').localeCompare(b.code || '');
            });

            // 按分類分組（用於統計）
            var byCategory = {};
            suppliers.forEach(function(s) {
                var cat = s.category || '未分類';
                if (!byCategory[cat]) byCategory[cat] = [];
                byCategory[cat].push(s);
            });

            // 篩選供應商
            var filteredSuppliers = suppliers.filter(function(s, idx) {
                s._sortedIdx = idx; // ★ Build 34: 排序後索引（用於顯示）
                var matchCategory = !vendorFilter.category || (s.category || '未分類') === vendorFilter.category;
                var matchKeyword = !vendorFilter.keyword || 
                    (s.name && s.name.toLowerCase().indexOf(vendorFilter.keyword) >= 0) ||
                    (s.code && s.code.toLowerCase().indexOf(vendorFilter.keyword) >= 0) ||
                    (s.shortName && s.shortName.toLowerCase().indexOf(vendorFilter.keyword) >= 0);
                return matchCategory && matchKeyword;
            });
            
            var rows = filteredSuppliers.map(function(v) {
                // 計算該供應商的應付帳款統計
                var vendorPayables = (state.data.payables || []).filter(function(p) {
                    return p.vendorCode === v.code || p.vendor === v.name;
                });
                var totalAmount = vendorPayables.reduce(function(s, p) { return s + (p.amount || 0); }, 0);
                var paidAmount = vendorPayables.filter(function(p) { return p.status === '已付款'; }).reduce(function(s, p) { return s + (p.amount || 0); }, 0);
                var pendingAmount = totalAmount - paidAmount;
                
                return '<tr>' +

        // ========== 供應商對帳功能 ==========
        function showVendorStatement(vendorCode) {
            var supplier = (state.data.suppliers || []).find(function(s) { return s.code === vendorCode; });
            if (!supplier) {
                showToast('❌ 找不到供應商資料', 'error');
                return;
            }
            
            // 取得該供應商所有應付帳款
            var vendorPayables = (state.data.payables || []).filter(function(p) {
                return p.vendorCode === vendorCode || p.vendor === supplier.name;
            });
            
            // 按日期排序（新到舊）
            vendorPayables.sort(function(a, b) {
                return (b.date || '').localeCompare(a.date || '');
            });
            
            // 統計
            var totalAmount = vendorPayables.reduce(function(s, p) { return s + (p.amount || 0); }, 0);
            var paidAmount = vendorPayables.filter(function(p) { return p.status === '已付款'; }).reduce(function(s, p) { return s + (p.amount || 0); }, 0);
            var pendingAmount = totalAmount - paidAmount;
            var paidCount = vendorPayables.filter(function(p) { return p.status === '已付款'; }).length;
            var pendingCount = vendorPayables.length - paidCount;
            
            // 按專案分組統計
            var byProject = {};
            vendorPayables.forEach(function(p) {

        function updateInstallmentPreview(idx) {
            var p = state.data.payables[idx];
            var count = parseInt(document.getElementById('inst-period-count').value) || 3;
            var interval = parseInt(document.getElementById('inst-interval').value) || 14;
            
            var perAmount = Math.floor(p.amount / count);
            var remainder = p.amount - (perAmount * count);
            
            // 計算預設每期預計付款日
            var baseDate = p.dueDate ? new Date(p.dueDate) : new Date();
            
            var html = '<table class="w-full text-sm">' +
                '<thead><tr class="bg-slate-100"><th class="p-2 text-left" style="width:80px">期數</th><th class="p-2 text-left">預計付款日</th><th class="p-2 text-right" style="width:120px">金額</th></tr></thead>' +
                '<tbody>';
            
            for (var i = 1; i <= count; i++) {
                var d = new Date(baseDate);
                d.setDate(d.getDate() + (i - 1) * interval);
                var dateStr = d.toISOString().split('T')[0];
                
                var amount = perAmount;
                var isLast = i === count;
                if (isLast) amount += remainder;
                
                var rowClass = isLast ? 'bg-purple-50' : '';
                var label = isLast ? '第' + i + '期(尾款)' : '第' + i + '期';
                
                html += '<tr class="' + rowClass + '">' +
                    '<td class="p-2"><span class="badge" style="background:#8b5cf6;color:white">' + label + '</span></td>' +
                    '<td class="p-2"><input type="date" id="inst-date-' + i + '" class="input" value="' + dateStr + '" style="width:150px"></td>' +
                    '<td class="p-2 text-right' + (isLast ? ' font-bold' : '') + '">' + formatCurrency(amount) + '</td></tr>';
            }
            
            html += '</tbody>' +
                '<tfoot><tr class="font-bold bg-slate-50"><td colspan="2" class="p-2 text-right">合計</td><td class="p-2 text-right text-blue-600">' + formatCurrency(p.amount) + '</td></tr></tfoot>' +
                '</table>';
            
            document.getElementById('installment-preview').innerHTML = html;
        }
        
        function createInstallments(idx) {
            var p = state.data.payables[idx];
            var count = parseInt(document.getElementById('inst-period-count').value) || 3;
            var perAmount = Math.floor(p.amount / count);
            var remainder = p.amount - (perAmount * count);
            
            // 取得用戶設定的日期
            var dates = [];
            for (var i = 1; i <= count; i++) {
                var dateInput = document.getElementById('inst-date-' + i);
                if (!dateInput || !dateInput.value) {
                    alert('請設定第 ' + i + ' 期的預計付款日期');
                    return;
                }
                dates.push(dateInput.value);
            }
            
            // 取得新ID
            var maxId = 0;
            state.data.payables.forEach(function(ap) {
                var num = parseInt(ap.id.replace('AP', ''));
                if (num > maxId) maxId = num;
            });
            
            // 建立分期項目
            var newItems = [];
            var alertMsg = '已成功分成 ' + count + ' 期！\n\n';
            
            for (var i = 1; i <= count; i++) {
                var amount = perAmount;
                if (i === count) amount += remainder; // 尾款加上餘數
                
                var periodLabel = i === count ? '第' + i + '期(尾款)' : '第' + i + '期';
                
                newItems.push({
                    id: 'AP' + String(maxId + i).padStart(4, '0'),
                    date: p.date,
                    dueDate: dates[i - 1],
                    category: p.category,
                    vendor: p.vendor,
                    vendorCode: p.vendorCode,
                    invoiceNo: p.invoiceNo,
                    description: p.description + ' (' + periodLabel + ')',
                    project: p.project,
                    projectId: p.projectId,
                    amount: amount,
                    status: '待付款',
                    estimated: false,
                    paymentMethod: p.paymentMethod,
                    installment: periodLabel,
                    parentId: p.id
                });
                
                alertMsg += periodLabel + '：' + formatCurrency(amount) + ' (' + dates[i - 1] + ')\n';
            }
            
            // 刪除原項目
            state.data.payables.splice(idx, 1);
            
            // 新增分期項目
            newItems.forEach(function(item) {
                state.data.payables.push(item);
            });
            
            logActivity('create', '應付帳款', '分期付款: ' + p.id + ' → ' + count + '期');
            saveData();
            closeModal();
            
            // 使用 setTimeout 確保 Modal 先關閉
            setTimeout(function() {
                showToast('✅ 已成功分成 ' + count + ' 期！', 'success');
            }, 100);
        }
        
        // ========== 付款單管理 ==========
        function renderPaymentRequest() {
            // 取得所有待付款的應付帳款
            var pendingPayables = state.data.payables.filter(function(p) {
                return p.status === '待付款';
            });
            
            // 取得所有供應商（有待付款的）
            var vendorList = [];
            pendingPayables.forEach(function(p) {
                if (p.vendor && vendorList.indexOf(p.vendor) < 0) {
                    vendorList.push(p.vendor);
                }
            });
            vendorList.sort();
            
            // 取得所有專案（有待付款的）
            var projectList = [];
            pendingPayables.forEach(function(p) {
                if (p.projectId && projectList.indexOf(p.projectId) < 0) {
                    projectList.push(p.projectId);
                }
            });
            projectList.sort();
            
            // 取得所有月份（有待付款的）
            var monthList = [];
            pendingPayables.forEach(function(p) {
                if (p.date) {
                    var month = p.date.substring(0, 6); // 取 114.01 格式
                    if (monthList.indexOf(month) < 0) {
                        monthList.push(month);
                    }
                }
            });
            monthList.sort();
            
            // 初始化篩選狀態
            if (!state.paymentRequestMonth) state.paymentRequestMonth = 'all';
            
            // 供應商篩選選項
            var vendorOptions = '<option value="all">全部供應商</option>';
            vendorList.forEach(function(v) {
                var selected = state.paymentRequestVendor === v ? 'selected' : '';
                var count = pendingPayables.filter(function(p) { return p.vendor === v; }).length;
                vendorOptions += '<option value="' + v + '" ' + selected + '>' + v + ' (' + count + '筆)</option>';
            });
            
            // 專案篩選選項
            var projectOptions = '<option value="all">全部專案</option>';
            projectList.forEach(function(proj) {
                var selected = state.paymentRequestProject === proj ? 'selected' : '';
                var count = pendingPayables.filter(function(p) { return p.projectId === proj; }).length;
                projectOptions += '<option value="' + proj + '" ' + selected + '>' + proj + ' (' + count + '筆)</option>';
            });
            
            // 月份篩選選項
            var monthOptions = '<option value="all">全部月份</option>';
            monthList.forEach(function(m) {
                var selected = state.paymentRequestMonth === m ? 'selected' : '';
                var count = pendingPayables.filter(function(p) { return p.date && p.date.substring(0, 6) === m; }).length;
                monthOptions += '<option value="' + m + '" ' + selected + '>' + m + ' (' + count + '筆)</option>';
            });
            
            // 篩選資料
            var filtered = pendingPayables.filter(function(p) {
                var vendorMatch = state.paymentRequestVendor === 'all' || p.vendor === state.paymentRequestVendor;
                var projMatch = state.paymentRequestProject === 'all' || p.projectId === state.paymentRequestProject;
                var monthMatch = state.paymentRequestMonth === 'all' || (p.date && p.date.substring(0, 6) === state.paymentRequestMonth);
                return vendorMatch && projMatch && monthMatch;
            });
            
            // 統計
            var totalAmount = filtered.reduce(function(s, p) { return s + safeAmount(p.amount); }, 0);
            var selectedAmount = 0;
            state.selectedPaymentItems.forEach(function(idx) {
                var p = state.data.payables[idx];
                if (p) selectedAmount += p.amount;
            });
            
            // 計算逾期和即將到期
            var today = new Date();
            today.setHours(0, 0, 0, 0);
            var sevenDaysLater = new Date(today);
            sevenDaysLater.setDate(sevenDaysLater.getDate() + 7);
            var overdueCount = 0, dueSoonCount = 0;
            filtered.forEach(function(p) {
                if (p.dueDate) {
                    var dueDate = new Date(p.dueDate);
                    dueDate.setHours(0, 0, 0, 0);
                    if (dueDate < today) overdueCount++;
                    else if (dueDate <= sevenDaysLater) dueSoonCount++;
                }
            });
            
            // 表格資料
            var rows = filtered.map(function(p) {
                var realIdx = state.data.payables.indexOf(p);
                var isChecked = state.selectedPaymentItems.indexOf(realIdx) >= 0;
                var dueBadge = '';
                if (p.dueDate) {
                    var dueDate = new Date(p.dueDate);
                    dueDate.setHours(0, 0, 0, 0);
                    if (dueDate < today) {
                        dueBadge = '<span class="badge badge-red text-xs ml-1">逾期</span>';
                    } else if (dueDate <= sevenDaysLater) {
                        dueBadge = '<span class="badge badge-orange text-xs ml-1">即將到期</span>';
                    }
                }
                
                return '<tr class="' + (isChecked ? 'bg-blue-50' : '') + '" style="cursor:pointer;">' +
                    '<td style="text-align:center;"><input type="checkbox" style="width:20px;height:20px;cursor:pointer;" ' + (isChecked ? 'checked' : '') + ' onclick="togglePaymentItem(' + realIdx + ')"></td>' +
                    '<td class="text-xs text-slate-400">' + p.id + '</td>' +
                    '<td>' + (p.date || '-') + '</td>' +
                    '<td>' + (p.dueDate || '-') + dueBadge + '</td>' +
                    '<td>' + (p.vendorCode || '') + '</td>' +
                    '<td class="font-medium">' + p.vendor + '</td>' +
                    '<td><span class="badge badge-blue text-xs">' + (p.projectId || '-') + '</span></td>' +
                    '<td class="text-sm">' + p.description + '</td>' +
                    '<td class="text-right font-bold">' + formatCurrency(p.amount) + '</td>' +

        function loadProjectBudget() {
            var projectId = document.getElementById('contract-project').value;
            var infoDiv = document.getElementById('project-budget-info');
            if (!projectId || !infoDiv) return;
            
            var budget = (state.data.projectBudgets || {})[projectId] || 0;
            var usedBudget = 0;
            
            // 計算該專案已使用的發包金額
            (state.data.contracts || []).forEach(function(c) {
                if (c.projectId === projectId) {
                    usedBudget += c.totalAmount || 0;
                }
            });
            
            var remaining = budget - usedBudget;
            
            if (budget > 0) {
                var usedPercent = Math.round(usedBudget / budget * 100);
                infoDiv.innerHTML = '<div class="p-3 bg-white rounded border mt-2">' +
                    '<div class="flex justify-between items-center mb-2">' +
                    '<span class="text-sm font-medium">專案工程預算</span>' +
                    '<span class="font-bold text-blue-600">' + formatCurrency(budget) + '</span>' +
                    '</div>' +
                    '<div style="background:#e2e8f0;border-radius:4px;height:8px;overflow:hidden;margin-bottom:8px;">' +
                    '<div style="background:' + (usedPercent > 90 ? '#ef4444' : '#3b82f6') + ';height:100%;width:' + usedPercent + '%;"></div></div>' +
                    '<div class="flex justify-between text-xs">' +
                    '<span class="text-slate-500">已發包：' + formatCurrency(usedBudget) + ' (' + usedPercent + '%)</span>' +
                    '<span class="' + (remaining < 0 ? 'text-red-600 font-bold' : 'text-green-600') + '">剩餘：' + formatCurrency(remaining) + '</span>' +
                    '</div></div>';
            } else {
                infoDiv.innerHTML = '<div class="text-xs text-slate-500 mt-2"><i class="fas fa-info-circle mr-1"></i>此專案尚未設定工程預算上限</div>';
            }
        }
        
        function updatePaymentTermsPreview() {
            var amount = parseFloat(document.getElementById('contract-amount').value) || 0;
            var periods = parseInt(document.getElementById('contract-periods').value) || 3;
            var interval = parseInt(document.getElementById('contract-interval').value) || 14;
            
            var previewDiv = document.getElementById('payment-terms-preview');
            if (!previewDiv) return;
            
            if (amount <= 0) {
                previewDiv.innerHTML = '<div class="text-sm text-slate-500">請輸入合約金額</div>';
                return;
            }
            
            var perAmount = Math.floor(amount / periods);
            var remainder = amount - (perAmount * periods);
            
            var baseDate = new Date(document.getElementById('contract-date').value || new Date());
            
            var html = '<table class="w-full text-sm"><thead><tr class="bg-white"><th class="p-2 text-left">期數</th><th class="p-2 text-left">階段</th><th class="p-2 text-left">預計付款日</th><th class="p-2 text-right">金額</th><th class="p-2 text-right">比例</th></tr></thead><tbody>';
            
            var stageNames = ['簽約', '進場', '中期', '後期', '完工', '驗收'];
            
            for (var i = 1; i <= periods; i++) {
                var d = new Date(baseDate);
                d.setDate(d.getDate() + (i - 1) * interval);
                var dateStr = d.toISOString().split('T')[0];
                
                var amt = perAmount;
                var isLast = i === periods;
                if (isLast) amt += remainder;
                
                var percent = amount > 0 ? Math.round(amt / amount * 100) : 0;
                var stageName = periods <= 3 ? ['簽約', '進場', '完工'][i - 1] || '第' + i + '期' : stageNames[i - 1] || '第' + i + '期';
                if (isLast && periods > 1) stageName = '尾款';
                
                var rowClass = isLast ? 'bg-purple-50' : '';
                html += '<tr class="' + rowClass + '">' +
                    '<td class="p-2"><span class="badge" style="background:#8b5cf6;color:white">第' + i + '期</span></td>' +
                    '<td class="p-2"><input type="text" id="term-stage-' + i + '" class="input" style="width:80px" value="' + stageName + '"></td>' +
                    '<td class="p-2"><input type="date" id="term-date-' + i + '" class="input" value="' + dateStr + '"></td>' +
                    '<td class="p-2 text-right font-medium">' + formatCurrency(amt) + '</td>' +
                    '<td class="p-2 text-right text-slate-500">' + percent + '%</td></tr>';
            }
            
            html += '</tbody><tfoot><tr class="font-bold bg-slate-100"><td colspan="3" class="p-2 text-right">合計</td><td class="p-2 text-right text-blue-600">' + formatCurrency(amount) + '</td><td class="p-2 text-right">100%</td></tr></tfoot></table>';
            
            previewDiv.innerHTML = html;
        }
        
        function saveContract() {
            var id = document.getElementById('contract-id').value;
            var date = document.getElementById('contract-date').value;
            var projectId = document.getElementById('contract-project').value;
            var vendorSelect = document.getElementById('contract-vendor');
            var vendorCode = vendorSelect.value;
            var vendorName = vendorSelect.options[vendorSelect.selectedIndex].text.split(' - ')[1] || '';
            var description = document.getElementById('contract-desc').value;
            var amount = parseFloat(document.getElementById('contract-amount').value) || 0;
            var periods = parseInt(document.getElementById('contract-periods').value) || 3;
            var workdays = parseInt(document.getElementById('contract-workdays').value) || 30;
            var customClause = document.getElementById('contract-custom-clause').value;
            
            if (!projectId) { showToast('⚠️ 請選擇專案', 'warning'); return; }
            if (!vendorCode) { showToast('⚠️ 請選擇承包商', 'warning'); return; }
            if (amount <= 0) { showToast('⚠️ 請輸入合約金額', 'warning'); return; }
            
            // 收集付款條件
            var paymentTerms = [];
            for (var i = 1; i <= periods; i++) {
                var stage = document.getElementById('term-stage-' + i).value;
                var termDate = document.getElementById('term-date-' + i).value;
                var perAmount = Math.floor(amount / periods);
                if (i === periods) perAmount += amount - (perAmount * periods);
                
                paymentTerms.push({
                    stage: stage,
                    period: i,
                    dueDate: termDate,
                    amount: perAmount,
                    percent: amount > 0 ? Math.round(perAmount / amount * 100) : 0
                });
            }
            
            // 收集但書條款
            var clauses = [];
            if (document.getElementById('clause-quality').checked) {
                clauses.push({ type: '品質', content: CONTRACT_CLAUSE_TEMPLATES.quality.join('\\n') });
            }
            if (document.getElementById('clause-schedule').checked) {
                var scheduleContent = CONTRACT_CLAUSE_TEMPLATES.schedule.map(function(s) {
                    return s.replace('{days}', workdays);
                }).join('\\n');
                clauses.push({ type: '工期', content: scheduleContent });
            }
            if (document.getElementById('clause-payment').checked) {
                clauses.push({ type: '付款', content: CONTRACT_CLAUSE_TEMPLATES.payment.join('\\n') });
            }
            if (document.getElementById('clause-warranty').checked) {
                clauses.push({ type: '保固', content: CONTRACT_CLAUSE_TEMPLATES.warranty.join('\\n') });
            }
            if (document.getElementById('clause-insurance').checked) {
                clauses.push({ type: '保險', content: CONTRACT_CLAUSE_TEMPLATES.insurance.join('\\n') });
            }
            if (document.getElementById('clause-change').checked) {
                clauses.push({ type: '變更', content: CONTRACT_CLAUSE_TEMPLATES.change.join('\\n') });
            }
            if (customClause) {
                clauses.push({ type: '其他', content: customClause });
            }
            
            // 產生對應的應付帳款
            var maxApId = 0;
            state.data.payables.forEach(function(p) {
                var num = parseInt(p.id.replace('AP', ''));
                if (num > maxApId) maxApId = num;
            });
            
            var linkedPayables = [];
            paymentTerms.forEach(function(term, idx) {
                var apId = 'AP' + String(maxApId + idx + 1).padStart(4, '0');
                linkedPayables.push(apId);
                
                var periodLabel = term.stage || ('第' + term.period + '期');
                if (term.period === periods && periods > 1) periodLabel = '尾款';
                
                state.data.payables.push({
                    id: apId,
                    date: date,
                    dueDate: term.dueDate,
                    category: '工程款',
                    vendor: vendorName,
                    vendorCode: vendorCode,
                    invoiceNo: '',
                    description: description + ' (' + periodLabel + ')',
                    project: (state.data.projects.find(function(p) { return p.id === projectId; }) || {}).name || projectId,
                    projectId: projectId,
                    amount: term.amount,
                    status: '待付款',
                    estimated: false,
                    paymentMethod: '匯款',
                    contractId: id,
                    installment: periodLabel
                });
            });
            
            // 建立合約
            var contract = {
                id: id,
                contractDate: date,
                projectId: projectId,
                vendor: vendorName,
                vendorCode: vendorCode,
                description: description,
                totalAmount: amount,
                workdays: workdays,
                paymentTerms: paymentTerms,
                clauses: clauses,
                linkedPayables: linkedPayables,
                status: '執行中',
                signedBy: state.data.company.contact || '',
                createdAt: new Date().toISOString()
            };
            
            if (!state.data.contracts) state.data.contracts = [];
            state.data.contracts.push(contract);
            
            saveData();
            render();
            closeModal();

        function showImportFromPayablesModal() {
            // 取得所有有應付帳款的專案
            var projectsWithAP = [];
            var projectAPs = {};
            
            state.data.payables.forEach(function(p) {
                if (p.projectId && p.status === '待付款') {
                    if (!projectAPs[p.projectId]) {
                        projectAPs[p.projectId] = [];
                        projectsWithAP.push(p.projectId);
                    }
                    projectAPs[p.projectId].push(p);
                }
            });
            
            if (projectsWithAP.length === 0) {
                showToast('⚠️ 目前沒有待付款的應付帳款可匯入', 'warning');
                return;
            }
            
            // 專案選項
            var projectOptions = '<option value="">-- 請選擇專案 --</option>';
            projectsWithAP.sort().forEach(function(pid) {
                var count = projectAPs[pid].length;
                var total = projectAPs[pid].reduce(function(s, p) { return s + safeAmount(p.amount); }, 0);
                var proj = (state.data.projects || []).find(function(pr) { return pr.id === pid; });
                var projName = proj ? proj.name : pid;
                projectOptions += '<option value="' + pid + '">' + pid + ' - ' + projName + ' (' + count + '筆, ' + formatCurrency(total) + ')</option>';
            });
            
            state.modal = '<div class="modal-header bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-t-lg -m-4 mb-4 p-4">' +

                '<button onclick="closeModal()" class="text-white"><i class="fas fa-times"></i></button></div>' +

                '<div id="project-payables-list"></div>' +

            state.modalSize = 'modal-xl';
            render();

            var projectId = document.getElementById('import-contract-project').value;
            var container = document.getElementById('project-payables-list');
            if (!container) return;
            
            if (!projectId) {
                container.innerHTML = '<div class="text-slate-400 text-center py-8">請先選擇專案</div>';
                return;
            }
            
            // 取得該專案的待付款應付帳款
            var payables = state.data.payables.filter(function(p) {
                return p.projectId === projectId && p.status === '待付款';

            if (payables.length === 0) {
                container.innerHTML = '<div class="text-slate-400 text-center py-8">此專案沒有待付款的應付帳款</div>';

                    '<span class="badge badge-blue text-xs">' + vendorCode + '</span>' +
                    '<span class="text-sm text-slate-500">(' + vData.items.length + '項)</span>' +
                    '</div>' +
                    '<div class="font-bold text-blue-600" id="vendor-total-' + vIdx + '">' + formatCurrency(vData.total) + '</div>' +
                    '</div>' +
                    '<div id="vendor-items-' + vIdx + '" class="p-3">' +
                    '<table class="text-sm w-full">' +
                    '<thead><tr class="bg-slate-50"><th style="width:30px"></th><th>說明</th><th style="width:120px">預計付款日</th><th style="width:120px;text-align:right">金額</th></tr></thead>' +
                    '<tbody>';
                
                vData.items.forEach(function(item, iIdx) {
                    var p = item.payable;
                    html += '<tr>' +
                        '<td><input type="checkbox" class="item-check-' + vIdx + '" data-idx="' + item.realIdx + '" data-vidx="' + vIdx + '" checked onchange="updateVendorTotal(' + vIdx + ')"></td>' +
                        '<td>' + (p.description || '-') + '</td>' +

                        '</tr>';

                html += '</tbody></table></div></div>';

        function toggleVendorSection(vIdx) {
            var items = document.getElementById('vendor-items-' + vIdx);
            if (items) {
                items.style.display = items.style.display === 'none' ? 'block' : 'none';
            }
        }
        
        function toggleVendorItems(vIdx) {
            var vendorCheck = document.getElementById('vendor-check-' + vIdx);
            var itemChecks = document.querySelectorAll('.item-check-' + vIdx);
            itemChecks.forEach(function(cb) {
                cb.checked = vendorCheck.checked;
            });
            updateVendorTotal(vIdx);
        }
        
        function updateVendorTotal(vIdx) {
            var itemChecks = document.querySelectorAll('.item-check-' + vIdx);
            var amountInputs = document.querySelectorAll('.item-amount-' + vIdx);
            var total = 0;
            var checkedCount = 0;
            
            itemChecks.forEach(function(cb, i) {
                if (cb.checked) {
                    total += parseFloat(amountInputs[i].value) || 0;
                    checkedCount++;
                }
            });
            
            var totalEl = document.getElementById('vendor-total-' + vIdx);
            if (totalEl) {
                totalEl.textContent = formatCurrency(total);
                totalEl.style.color = checkedCount > 0 ? '#2563eb' : '#94a3b8';
            }
            
            // 更新供應商勾選狀態
            var vendorCheck = document.getElementById('vendor-check-' + vIdx);
            if (vendorCheck) {
                vendorCheck.checked = checkedCount > 0;
            }
        }
        
        function executeImportPayablesToContract() {
            var projectId = document.getElementById('import-contract-project').value;
            if (!projectId) {
                alert('請選擇專案');
                return;
            }
            
            var baseId = document.getElementById('import-contract-id').value || 'SC001';
            var workdays = parseInt(document.getElementById('import-contract-workdays').value) || 30;
            
            // 收集但書條款
            var clauses = [];
            if (document.getElementById('imp-clause-quality').checked) {
                clauses.push({ type: '品質', content: CONTRACT_CLAUSE_TEMPLATES.quality.join('\\n') });
            }
            if (document.getElementById('imp-clause-schedule').checked) {
                var scheduleContent = CONTRACT_CLAUSE_TEMPLATES.schedule.map(function(s) {
                    return s.replace('{days}', workdays);
                }).join('\\n');
                clauses.push({ type: '工期', content: scheduleContent });
            }
            if (document.getElementById('imp-clause-payment').checked) {
                clauses.push({ type: '付款', content: CONTRACT_CLAUSE_TEMPLATES.payment.join('\\n') });
            }
            if (document.getElementById('imp-clause-warranty').checked) {
                clauses.push({ type: '保固', content: CONTRACT_CLAUSE_TEMPLATES.warranty.join('\\n') });
            }
            if (document.getElementById('imp-clause-insurance').checked) {
                clauses.push({ type: '保險', content: CONTRACT_CLAUSE_TEMPLATES.insurance.join('\\n') });
            }
            if (document.getElementById('imp-clause-change').checked) {
                clauses.push({ type: '變更', content: CONTRACT_CLAUSE_TEMPLATES.change.join('\\n') });
            }
            
            // 收集各供應商的勾選項目
            var vendorSections = document.querySelectorAll('[id^="vendor-check-"]');
            var contractsCreated = 0;
            var baseNum = parseInt(baseId.replace('SC', '')) || 1;
            
            vendorSections.forEach(function(vendorCheck, vIdx) {
                if (!vendorCheck.checked) return;
                
                var itemChecks = document.querySelectorAll('.item-check-' + vIdx);
                var amountInputs = document.querySelectorAll('.item-amount-' + vIdx);
                var dateInputs = document.querySelectorAll('[data-field="dueDate"]');
                
                var selectedItems = [];
                var vendor = '';
                var vendorCode = '';
                var totalAmount = 0;
                
                itemChecks.forEach(function(cb, i) {
                    if (cb.checked) {
                        var realIdx = parseInt(cb.getAttribute('data-idx'));
                        var newAmount = parseFloat(amountInputs[i].value) || 0;
                        var newDueDate = amountInputs[i].parentElement.previousElementSibling.querySelector('input').value;
                        
                        // 更新應付帳款金額和日期
                        if (state.data.payables[realIdx]) {
                            state.data.payables[realIdx].amount = newAmount;
                            if (newDueDate) state.data.payables[realIdx].dueDate = newDueDate;
                            
                            vendor = state.data.payables[realIdx].vendor;
                            vendorCode = state.data.payables[realIdx].vendorCode || '';
                        }
                        
                        selectedItems.push({
                            idx: realIdx,
                            amount: newAmount,
                            dueDate: newDueDate
                        });
                        totalAmount += newAmount;
                    }
                });
                
                if (selectedItems.length === 0) return;
                
                // 建立合約
                var contractId = 'SC' + String(baseNum + contractsCreated).padStart(3, '0');
                var linkedPayables = selectedItems.map(function(item) {
                    return state.data.payables[item.idx].id;
                });
                
                // 建立付款條款
                var paymentTerms = selectedItems.map(function(item, i) {
                    var p = state.data.payables[item.idx];
                    return {
                        stage: p.description || ('第' + (i + 1) + '期'),
                        period: i + 1,
                        dueDate: item.dueDate || p.dueDate,
                        amount: item.amount,
                        percent: totalAmount > 0 ? Math.round(item.amount / totalAmount * 100) : 0
                    };
                });
                
                // 取得工程項目描述
                var descriptions = selectedItems.slice(0, 3).map(function(item) {
                    var p = state.data.payables[item.idx];
                    return p.description ? p.description.split('：').pop().split('(')[0].trim() : '';
                }).filter(function(d) { return d; });
                var descText = descriptions.join('、');
                if (selectedItems.length > 3) descText += '等' + selectedItems.length + '項';
                
                var contract = {
                    id: contractId,
                    contractDate: new Date().toISOString().split('T')[0],
                    projectId: projectId,
                    vendor: vendor,
                    vendorCode: vendorCode,
                    description: descText || '工程發包',
                    totalAmount: totalAmount,
                    workdays: workdays,
                    paymentTerms: paymentTerms,
                    clauses: clauses,
                    linkedPayables: linkedPayables,
                    status: '執行中',
                    signedBy: state.data.company.contact || '',
                    createdAt: new Date().toISOString()
                };
                
                // 更新應付帳款關聯
                selectedItems.forEach(function(item) {
                    state.data.payables[item.idx].contractId = contractId;
                });
                
                if (!state.data.contracts) state.data.contracts = [];
                state.data.contracts.push(contract);
                contractsCreated++;
            });
            
            if (contractsCreated === 0) {
                showToast('⚠️ 請至少勾選一個項目', 'warning');
                return;
            }
            
            saveData();
            closeModal();
            showToast('✅ 成功建立 ' + contractsCreated + ' 份合約！已關聯對應的應付帳款', 'success');
        }

        function switchYear(year) {
            year = parseInt(year);
            // 儲存當前年度資料
            var currentYear = state.data.currentYear || 2026;
            try { localStorage.setItem('fangwei_finance_' + currentYear, JSON.stringify(state.data)); } catch (e) { console.warn('⚠️ switchYear 儲存失敗:', e); }
            
            // ★★★ 停止舊年度的監聽 ★★★
            if (firebaseDB) {
                firebaseDB.ref('fangwei/finance/' + currentYear).off('value');
                collaborationState.isListening = false;
            }
            
            // 載入新年度資料
            var savedData = localStorage.getItem('fangwei_finance_' + year);
            if (savedData) {
                try {
                    state.data = JSON.parse(savedData); // ★★★ Build 33: 加入 try-catch ★★★
                } catch (e) {
                    console.error('❌ switchYear JSON.parse 失敗:', e);
                    state.data = JSON.parse(JSON.stringify(initialData));
                    showToast('⚠️ 年度資料損毀，已重置為預設值', 'warning');
                }
            } else {
                // 新年度，複製基本設定但清空交易資料
                state.data = JSON.parse(JSON.stringify(initialData));
                state.data.receivables = [];
                state.data.payables = [];

        function saveEditCustomer(idx) {

            var oldInvoice = cust.invoice;
            cust.name = document.getElementById('editCust-name').value;
            cust.shortName = document.getElementById('editCust-short').value;

            if (oldInvoice !== cust.invoice) {
                var paymentMethod = cust.invoice === '有' ? '匯款' : '現金';
                
                state.data.projects.forEach(function(p) {
                    if (p.customerCode === cust.code) {
                        p.invoice = cust.invoice;
                    }
                });
                // 勾稽連動：更新該客戶所有應收帳款的發票狀態和收款方式
                state.data.receivables.forEach(function(r) {
                    if (r.customerCode === cust.code) {
                        r.invoice = cust.invoice;
                        r.paymentMethod = paymentMethod;
                    }
                });
                // 勾稽連動：更新該客戶所有專案的應付帳款付款方式
                state.data.projects.forEach(function(p) {
                    if (p.customerCode === cust.code) {
                        state.data.payables.forEach(function(ap) {
                            if (ap.projectId === p.id) {

                        });
                    }
                });

            saveData();
            closeModal();
        }

        function addReceivable() {
            var projectId = document.getElementById('ar-projectId').value;
            
            if (!projectId) {
                showToast('⚠️ 請選擇關聯專案', 'warning');
                return;
            }
            
            // 從專案取得發票設定
            var project = (state.data.projects || []).find(function(p) { return p.id === projectId; });
            var invoice = project ? (project.invoice || '無') : '無';
            var paymentMethod = invoice === '有' ? '匯款' : '現金';
            
            var arMaxId = 0;
            (state.data.receivables || []).forEach(function(ar) {
                var num = parseInt(ar.id.replace(/[^0-9]/g, ''), 10);
                if (!isNaN(num) && num > arMaxId) arMaxId = num;
            });
            var newId = 'AR' + String(arMaxId + 1).padStart(4, '0');
            state.data.receivables.push({
                id: newId,
                date: document.getElementById('ar-date').value,
                expectedDate: document.getElementById('ar-dueDate').value,
                customer: document.getElementById('ar-customer').value,
                customerCode: document.getElementById('ar-customerCode').value,
                description: document.getElementById('ar-desc').value,
                projectId: projectId,
                amount: Number(document.getElementById('ar-amount').value) || 0,
                invoice: invoice,
                paymentMethod: paymentMethod,
                status: document.getElementById('ar-status').value
            });
            saveData();
            render();
            closeModal();
        }

            collaborationState.hasUnsavedChanges = true; // ★★★ Build 33 ★★★
            r.status = r.status === '已收款' ? '待收款' : '已收款';
            try { saveData(); } catch (e) { console.error('saveData 失敗:', e); }
            render(true);
        }

        function markAsReceived(idx) {
            console.log('🎯 markAsReceived 開始: idx=' + idx);
            var r = state.data.receivables[idx];
            if (!r) {
                console.error('❌ markAsReceived: receivables[' + idx + '] 不存在，總筆數=' + state.data.receivables.length);
                showToast('⚠️ 找不到此筆應收帳款資料，請重新整理頁面', 'warning');
                return;
            }
            console.log('🎯 markAsReceived: 找到資料 id=' + r.id + ', customer=' + r.customer + ', 目前status=' + r.status);
            if (r.status === '已收款') {
                showToast('⚠️ 此筆已經是「已收款」狀態', 'warning');
                return;
            }
            if (confirm('確定將「' + r.customer + '」的應收款項 ' + formatCurrency(r.amount) + ' 標記為已收款？')) {
                // ★★★ Build 33: 先標記有未儲存變更，防止 confirm 期間的雲端覆蓋 ★★★
                collaborationState.hasUnsavedChanges = true;
                r.status = '已收款';
                console.log('✅ markAsReceived: idx=' + idx + ', id=' + r.id + ', new status=' + r.status);

                // 驗證 state.data 確實更新
                console.log('✅ 驗證: state.data.receivables[' + idx + '].status = ' + state.data.receivables[idx].status);

                try {
                    saveData();
                } catch (e) {
                    console.error('❌ markAsReceived saveData 失敗:', e);
                    showToast('⚠️ 儲存時發生錯誤，但狀態已在記憶體中更新', 'warning');
                }
                // ★★★ 無論 saveData 是否成功，一定要重新渲染 ★★★

        // 強制上傳至雲端（★ Build 35: 同時建立版本快照）
        function forceCloudSync() {
            if (isViewer()) {
                showToast('❌ 訪客模式無法上傳資料', 'error');
                return;
            }

            if (!confirm('確定要將本地資料強制上傳至雲端？\n\n這將覆蓋雲端上的即時資料，並建立一個版本快照。')) {
                return;
            }

            var year = state.data.currentYear || 2026;
            var timestamp = new Date().toISOString();

            // ★ Build 35: 先建立本地版本快照（不依賴 Firebase 寫入成功）
            saveCloudVersion(function(vOk, vInfo) {
                if (vOk) {
                    console.log('✅ 版本快照已建立: ' + vInfo);
                } else {
                    console.warn('⚠️ 版本快照建立失敗: ' + vInfo);
                }
            });

            // 嘗試 Firebase 上傳
            if (!firebaseEnabled || !firebaseDB) {
                showToast('✅ 已建立版本快照（雲端未連線，僅存本地）', 'info');
                logActivity('sync', '版本快照', '已建立本地版本快照');
                return;
            }

            cloudSyncStatus = 'syncing';
            renderSyncStatus();

            var dataSnapshot = JSON.parse(JSON.stringify(state.data)); // 深拷貝
            firebaseDB.ref('fangwei/finance/' + year).set({
                data: dataSnapshot,
                version: getVersionString(),
                lastUpdate: timestamp,
                timestamp: timestamp,
                updatedBy: collaborationState.userName,
                sessionId: getSessionId()
            }).then(function() {
                cloudSyncStatus = 'connected';
                lastCloudSync = new Date();
                collaborationState.lastKnownVersion = timestamp;
                collaborationState.hasUnsavedChanges = false;
                try { localStorage.setItem('fangwei_finance_' + year + '_savedAt', timestamp); } catch (e) { /* ignore */ }
                renderSyncStatus();
                showToast('✅ 已上傳至雲端，並建立版本快照', 'success');
                logActivity('sync', '雲端同步', '強制上傳至雲端 + 版本快照');
            }).catch(function(e) {
                cloudSyncStatus = 'connected'; // 維持連線狀態（只是寫入被拒）
                renderSyncStatus();
                showToast('⚠️ 雲端上傳受限（Firebase 規則），但已建立本地版本快照', 'warning');
                logActivity('sync', '版本快照', '本地版本快照（雲端寫入受限: ' + e.message + '）');
            });
        }
