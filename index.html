            var jsonStr;

            try {
                // ★ Build 35: 深拷貝防引用污染 + 安全序列化
                backupData = {
                    version: getVersionString(),
                    exportDate: new Date().toISOString(),
                    year: currentYear,
                    data: JSON.parse(JSON.stringify(state.data))
                };
                jsonStr = JSON.stringify(backupData, null, 2);
            } catch (serializeErr) {
                console.error('❌ JSON 序列化失敗:', serializeErr);
                showToast('❌ 備份失敗：資料序列化錯誤 — ' + serializeErr.message, 'error');
                return;
            }

            var filename = '方為設計_財務備份_' + currentYear + '_' + new Date().toISOString().slice(0, 10) + '.json';

            // ★ Build 35: 直接用 Blob 下載（移除 navigator.share，因為在桌面常失效）
            try {
                var blob = new Blob([jsonStr], { type: 'application/json;charset=utf-8' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.style.display = 'none';
                document.body.appendChild(a);

                // ★ Build 35: 用 setTimeout 確保 click 生效（某些瀏覽器需要）
                setTimeout(function() {
                    a.click();
                    setTimeout(function() {
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    }, 200);
                }, 0);

                showToast('✅ 備份檔案已下載: ' + filename, 'success');
                logActivity('export', '本地備份', '匯出 JSON 備份');
            } catch (e) {
                console.error('下載失敗:', e);
                // 下載失敗，使用 Modal 方式（複製 JSON 文字）
                showBackupModal(jsonStr, filename);
            }
        }
        
        // 顯示備份 Modal（用於下載失敗時）
        function showBackupModal(jsonStr, filename) {
            var html = '<div class="modal-header"><h3 class="font-bold"><i class="fas fa-download mr-2"></i>本地備份</h3>' +
                '<button onclick="closeModal()" class="text-slate-500"><i class="fas fa-times"></i></button></div>' +
                '<div class="space-y-4">' +
                '<div class="p-3 bg-blue-50 rounded-lg border border-blue-200">' +
                '<p class="text-sm text-blue-800"><i class="fas fa-info-circle mr-1"></i>檔案名稱：<strong>' + filename + '</strong></p>' +
                '</div>' +
                '<div>' +
                '<label class="text-sm font-medium text-slate-700">備份內容（請複製保存）：</label>' +
                '<textarea id="backup-textarea" class="input mt-1" style="height:200px;font-family:monospace;font-size:11px;line-height:1.3;" readonly>' + jsonStr + '</textarea>' +
                '</div>' +
                '<div class="grid grid-cols-2 gap-2">' +
                '<button class="btn btn-primary" onclick="copyBackupToClipboard()"><i class="fas fa-copy mr-1"></i>複製到剪貼簿</button>' +
                '<button class="btn" style="background:#22c55e;color:white" onclick="selectAllBackupText()"><i class="fas fa-check-double mr-1"></i>全選文字</button>' +
                '</div>' +
                '<p class="text-xs text-slate-500 text-center">複製後可貼到「備忘錄」或傳送給自己保存</p>' +
                '</div>';
            
            showModal('📁 本地備份', html, 'modal-lg');
        }
        
        // 複製備份到剪貼簿
        function copyBackupToClipboard() {
            var textarea = document.getElementById('backup-textarea');
            if (!textarea) return;
            
            // 使用現代 Clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textarea.value).then(function() {
                    showToast('✅ 已複製到剪貼簿！', 'success');
                }).catch(function() {
                    // 失敗時使用舊方法
                    fallbackCopyBackup(textarea);
                });
            } else {
                fallbackCopyBackup(textarea);
            }
        }
        
        // 舊式複製方法
        function fallbackCopyBackup(textarea) {
            textarea.select();
            textarea.setSelectionRange(0, 99999); // For mobile
            try {
                document.execCommand('copy');
                showToast('✅ 已複製到剪貼簿！', 'success');
            } catch (e) {
                showToast('❌ 複製失敗，請手動全選複製', 'error');
            }
        }
        
        // 全選備份文字
        function selectAllBackupText() {
            var textarea = document.getElementById('backup-textarea');
            if (textarea) {
                textarea.focus();
                textarea.select();
                textarea.setSelectionRange(0, 99999);
                showToast('已全選，請複製 (Ctrl+C 或長按複製)', 'info');
            }
        }
        
        function copyBackupText() {
            copyBackupToClipboard();
        }
        
        function importBackup() {
            document.getElementById('backupFileInput').click();
        }
        
        function handleBackupFile(event) {
            var file = event.target.files[0];
            if (!file) return;
            
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var backupData = JSON.parse(e.target.result);
                    
                    // 驗證備份檔案格式
                    if (!backupData.data || !backupData.data.receivables || !backupData.data.payables) {
                        throw new Error('無效的備份檔案格式');
                    }
                    
                    // 顯示備份資訊
                    var info = '📁 備份檔案資訊：\n\n' +
                        '匯出日期：' + (backupData.exportDate ? new Date(backupData.exportDate).toLocaleString('zh-TW') : '未知') + '\n' +
                        '資料年度：' + (backupData.year || backupData.data.currentYear || '未知') + '年\n' +
                        '應收帳款：' + (backupData.data.receivables || []).length + ' 筆\n' +
                        '應付帳款：' + (backupData.data.payables || []).length + ' 筆\n' +
                        '專案：' + (backupData.data.projects || []).length + ' 個\n' +
                        '客戶：' + (backupData.data.customers || []).length + ' 位\n' +
                        '供應商：' + (backupData.data.vendors || []).length + ' 家\n\n' +
                        '⚠️ 確定要還原此備份嗎？目前的資料將被覆蓋！';
                    
                    if (confirm(info)) {
                        // 還原資料（深拷貝避免引用問題）
                        state.data = JSON.parse(JSON.stringify(backupData.data));

                        // 儲存到 localStorage
                        var year = state.data.currentYear || 2026;
                        try {
                            localStorage.setItem('fangwei_finance_' + year, JSON.stringify(state.data));
                            localStorage.setItem('jtmFinanceDataV3', JSON.stringify(state.data));
                        } catch (e) { console.warn('⚠️ 還原備份 localStorage 儲存失敗:', e); showToast('⚠️ 本地儲存空間不足，資料已載入記憶體', 'warning'); }
                        
                        render();
                        showToast('✅ 資料還原成功！已載入 ' + year + ' 年度資料', 'success');
                    }
                } catch (err) {
                    showToast('❌ 還原失敗：' + err.message, 'error');
                }
            };
            reader.readAsText(file);
            
            // 重置 input 以便可以再次選擇同一檔案
            event.target.value = '';
        }
        
        function resetData() {
            if (confirm('確定要重置所有資料嗎？此操作無法復原！')) {
                localStorage.removeItem('jtmFinanceDataV3');
                location.reload();
            }
        }
        
        // ========== 主渲染 ==========
        function render(preserveScroll) {
            // ★★★ 始終保存滾動位置 ★★★
            var scrollPositions = {
                window: window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0,
                main: 0,
                ar: 0,
                ap: 0,
                payment: 0,
                contracts: 0,
                vendors: 0,
                projects: 0
            };
            
            // 保存主內容區滾動
            var mainContent = document.querySelector('.main-content');
            if (mainContent) {
                scrollPositions.main = mainContent.scrollTop || 0;
            }
            
            // 保存各個表格滾動容器
            var scrollContainers = {
                'ar-table-scroll': 'ar',
                'ap-table-scroll': 'ap',
                'payment-table-scroll': 'payment',
                'contracts-table-scroll': 'contracts',
                'vendors-table-scroll': 'vendors',
                'projects-table-scroll': 'projects'
            };
            
            Object.keys(scrollContainers).forEach(function(id) {
                var el = document.getElementById(id);
                if (el) {
                    scrollPositions[scrollContainers[id]] = el.scrollTop || 0;
                }
            });
            
            // 保存頁面內容區的滾動
            var pageContent = document.querySelector('.p-6');
            if (pageContent) {
                scrollPositions.pageContent = pageContent.scrollTop || 0;
            }
            
            var pageContentHtml = '';
            switch (state.currentPage) {
                case 'dashboard': pageContentHtml = renderDashboard(); break;
                case 'income-statement': pageContentHtml = renderIncomeStatement(); break;
                case 'balance-sheet': pageContentHtml = renderBalanceSheet(); break;
                case 'receivables': pageContentHtml = renderReceivables(); break;
                case 'invoices': pageContentHtml = renderInvoices(); break;
                case 'payables': pageContentHtml = renderPayables(); break;
                case 'payment-request': pageContentHtml = renderPaymentRequest(); break;
                case 'contracts': pageContentHtml = renderContracts(); break;
                case 'projects': pageContentHtml = renderProjects(); break;
                case 'bonus-settlement': pageContentHtml = renderBonusSettlement(); break;
                case 'customers': pageContentHtml = renderCustomers(); break;
                case 'vendors': pageContentHtml = renderVendors(); break;
                case 'settings': pageContentHtml = renderSettings(); break;
            }
            
            // ★ Build 35: 訪客模式頂部提示橫幅
            var viewerBanner = isViewer() ? '<div style="background:linear-gradient(to right,#fef3c7,#fde68a);padding:6px 16px;text-align:center;font-size:13px;color:#92400e;font-weight:600;border-bottom:1px solid #f59e0b"><i class="fas fa-eye mr-2"></i>訪客模式（唯讀）— 資料僅供檢視，不會修改雲端。<a href="javascript:showRoleSelectDialog(true)" style="color:#1e40af;text-decoration:underline;margin-left:8px">切換為管理者</a></div>' : '';

            document.getElementById('app').innerHTML =
                renderSidebar() +
                '<div class="main-content" style="margin-left:' + (state.sidebarCollapsed ? '60px' : '220px') + '">' +
                viewerBanner +
                renderHeader() +
                pageContentHtml +
                '</div>' +
                renderModal();
            
            // ★★★ 立即恢復滾動位置（不用 setTimeout）★★★
            requestAnimationFrame(function() {
                // 恢復 window 滾動
                if (scrollPositions.window > 0) {
                    window.scrollTo(0, scrollPositions.window);
                }
                
                // 恢復主內容區
                var newMainContent = document.querySelector('.main-content');
                if (newMainContent && scrollPositions.main > 0) {
                    newMainContent.scrollTop = scrollPositions.main;
                }
                
                // 恢復各表格滾動容器
                Object.keys(scrollContainers).forEach(function(id) {
                    var el = document.getElementById(id);
                    var key = scrollContainers[id];
                    if (el && scrollPositions[key] > 0) {
                        el.scrollTop = scrollPositions[key];
                    }
                });
                
                // 再次確保恢復（有些瀏覽器需要延遲）
                setTimeout(function() {
                    if (scrollPositions.window > 0) {
                        window.scrollTo(0, scrollPositions.window);
                    }
                    var mc = document.querySelector('.main-content');
                    if (mc && scrollPositions.main > 0) {
                        mc.scrollTop = scrollPositions.main;
                    }
                }, 50);
            });
            
            // 渲染圖表（如果在損益表頁面）
            if (state.currentPage === 'income-statement') {
                setTimeout(function() { renderIncomeChart(); }, 50);
            }
            // 渲染現金流預測圖表（如果在儀表板）
            if (state.currentPage === 'dashboard') {
                setTimeout(function() { 
                    renderCashFlowChart(); 
                    renderExpensePieChart();
                    renderMonthlyTrendChart();
                }, 50);
            }
            
            // 隱藏載入畫面並清除超時
            if (typeof loadingTimeout !== 'undefined') {
                clearTimeout(loadingTimeout);
            }
            var loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.style.display = 'none';
            }

            // ★ Build 35: 渲染角色徽章 + 同步狀態
            renderRoleBadge();
            renderSyncStatus();

            // ★ Build 35: 訪客模式 → 鎖定所有編輯 UI
            if (isViewer()) {
                setTimeout(applyViewerLock, 0);
            }
        }

        // ★ Build 35: 訪客唯讀鎖 — 禁用所有可編輯元素
        function applyViewerLock() {
            if (!isViewer()) return;
            var mainContent = document.querySelector('.main-content');
            if (!mainContent) return;

            // 1. 禁用所有 input、textarea、select
            var inputs = mainContent.querySelectorAll('input, textarea, select');
            for (var i = 0; i < inputs.length; i++) {
                var el = inputs[i];
                // 保留搜尋框可用（讓訪客可以搜尋/篩選）
                if (el.placeholder && (el.placeholder.indexOf('搜尋') >= 0 || el.placeholder.indexOf('篩選') >= 0 || el.placeholder.indexOf('search') >= 0)) continue;
                // 保留年度切換
                if (el.id === 'yearSelect') continue;
                el.disabled = true;
                el.style.opacity = '0.6';
                el.style.cursor = 'not-allowed';
            }

            // 2. 禁用所有操作按鈕（保留導航、搜尋、雲端載入相關按鈕）
            var buttons = mainContent.querySelectorAll('button');
            var safeKeywords = ['搜尋', '篩選', '導航', '切換', '載入', '歷史版本', '雲端載入', '匯出 JSON', '匯出 Excel', 'Excel 報表', '查看日誌', '切換身份', 'showCloudVersionPicker', 'forceCloudLoad', 'showRoleSelectDialog', 'showActivityLog', 'exportAllData', 'exportBackup', 'navigate'];
            for (var j = 0; j < buttons.length; j++) {
                var btn = buttons[j];
                var btnText = btn.textContent || '';
                var btnOnclick = btn.getAttribute('onclick') || '';

                // 保留安全按鈕
                var isSafe = false;
                for (var k = 0; k < safeKeywords.length; k++) {
                    if (btnText.indexOf(safeKeywords[k]) >= 0 || btnOnclick.indexOf(safeKeywords[k]) >= 0) {
                        isSafe = true;
                        break;
                    }
                }
                // 保留導航按鈕、sidebar、toggle
                if (btnOnclick.indexOf('navigate(') >= 0 || btnOnclick.indexOf('toggleSidebar') >= 0 || btnOnclick.indexOf('closeModal') >= 0) isSafe = true;

                if (!isSafe) {
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                    btn.style.cursor = 'not-allowed';
                    btn.title = '訪客模式：唯讀，無法操作';
                }
            }

            // 3. 在所有可編輯的 td/div[contenteditable] 上禁用
            var editables = mainContent.querySelectorAll('[contenteditable="true"]');
            for (var m = 0; m < editables.length; m++) {
                editables[m].setAttribute('contenteditable', 'false');
                editables[m].style.opacity = '0.6';
            }
        }
        
        // ========== 報價系統即時同步 ==========
        var lastSyncSignal = localStorage.getItem('fangwei_sync_signal');
        var syncNotificationShown = false;
        
        // 檢查是否有新的報價匯出
        function checkQuoteSync() {
            var currentSignal = localStorage.getItem('fangwei_sync_signal');
            if (currentSignal && currentSignal !== lastSyncSignal) {
                lastSyncSignal = currentSignal;
                try {
                    var signal = JSON.parse(currentSignal);
                    if (signal.action === 'quote_export' && !syncNotificationShown) {
                        showSyncNotification(signal);
                    }
                } catch (e) {
                    console.error('同步信號解析錯誤', e);
                }
            }
        }
        
        // 顯示同步通知
        function showSyncNotification(signal) {
            syncNotificationShown = true;
            var notification = document.createElement('div');
            notification.id = 'sync-notification';
            notification.style.cssText = 'position:fixed;top:20px;right:20px;background:linear-gradient(135deg,#1e40af,#3b82f6);color:white;padding:20px;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,0.3);z-index:10000;max-width:350px;animation:slideIn 0.3s ease-out';
            notification.innerHTML = 
                '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">' +
                '<div style="background:rgba(255,255,255,0.2);padding:10px;border-radius:8px"><i class="fas fa-sync-alt fa-lg"></i></div>' +
                '<div><div style="font-weight:bold;font-size:16px">報價系統有新資料</div>' +
                '<div style="font-size:12px;opacity:0.8">' + escapeHtml(new Date(signal.timestamp).toLocaleString()) + '</div></div></div>' +
                '<div style="background:rgba(0,0,0,0.2);padding:12px;border-radius:8px;margin-bottom:12px">' +
                '<div style="font-size:14px"><i class="fas fa-project-diagram mr-2"></i>' + escapeHtml(signal.projectCode || '') + ' - ' + escapeHtml(signal.projectName || '') + '</div>' +
                '<div style="font-size:18px;font-weight:bold;color:#86efac;margin-top:4px">' + formatCurrency(signal.amount || 0) + '</div></div>' +
                '<div style="display:flex;gap:8px">' +
                '<button onclick="importFromQuoteNow()" style="flex:1;padding:10px;background:#22c55e;border:none;border-radius:6px;color:white;font-weight:bold;cursor:pointer"><i class="fas fa-download mr-1"></i>立即匯入</button>' +
                '<button onclick="dismissSyncNotification()" style="padding:10px 15px;background:rgba(255,255,255,0.2);border:none;border-radius:6px;color:white;cursor:pointer"><i class="fas fa-times"></i></button></div>';
            
            document.body.appendChild(notification);
            
            // 添加動畫樣式
            if (!document.getElementById('sync-animation-style')) {
                var style = document.createElement('style');
                style.id = 'sync-animation-style';
                style.textContent = '@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}';
                document.head.appendChild(style);
            }
        }
        
        // 關閉同步通知
        function dismissSyncNotification() {
            var notification = document.getElementById('sync-notification');
            if (notification) {
                notification.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(function() { notification.remove(); }, 300);
            }
            syncNotificationShown = false;
        }
        
        // 立即匯入報價資料（從 Firebase 通知觸發時）
        function importFromQuoteNow() {
            dismissSyncNotification();
            // 優先嘗試從 Firebase 讀取完整報價資料
            if (firebaseEnabled && firebaseDB) {
                showToast('📡 正在從雲端讀取完整報價資料...', 'info');
                firebaseDB.ref('fangwei/sync/quote_export').once('value').then(function(snap) {
                    var cloudData = snap.val();
                    if (cloudData && cloudData.quoteData) {
                        console.log('☁️ importFromQuoteNow: 從 Firebase 讀取完整報價資料');
                        _processQuoteData(cloudData.quoteData);
                    } else {
                        // 雲端沒有完整資料，回退到 localStorage
                        console.log('⚠️ Firebase 無完整報價資料，嘗試 localStorage');
                        importFromQuoteSystem();
                    }
                }).catch(function(e) {
                    console.error('Firebase 讀取失敗，回退到 localStorage:', e);
                    importFromQuoteSystem();
                });
            } else {
                importFromQuoteSystem();
            }
        }
        
        // 監聽 storage 事件（其他分頁的變化）
        window.addEventListener('storage', function(e) {
            if (e.key === 'fangwei_sync_signal') {
                checkQuoteSync();
            }
        });
        
        // 定期檢查（同一分頁內的變化）
        setInterval(checkQuoteSync, 2000);
        
        // 頁面載入時檢查是否有待匯入的資料
        setTimeout(function() {
            var quoteData = localStorage.getItem('fangwei_quote_export');
            var signal = localStorage.getItem('fangwei_sync_signal');
            if (quoteData && signal) {
                try {
                    var signalData = JSON.parse(signal);
                    var exportTime = new Date(signalData.timestamp);
                    var now = new Date();
                    // 如果匯出時間在5分鐘內，顯示通知
                    if ((now - exportTime) < 5 * 60 * 1000) {
                        showSyncNotification(signalData);
                    }
                } catch (e) {}
            }
        }, 1000);
        
        // ========== 快捷鍵支援 ==========
        document.addEventListener('keydown', function(e) {
            // 如果在輸入框中，不攔截快捷鍵
            var activeEl = document.activeElement;
            var isInputting = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA' || activeEl.tagName === 'SELECT');
            
            // Esc 關閉 Modal（隨時可用）
            if (e.key === 'Escape') {
                if (state.modal) {
                    closeModal();
                    e.preventDefault();
                }
                return;
            }
            
            // 以下快捷鍵僅在非輸入狀態時有效
            if (isInputting) return;
            
            // Ctrl+S 保存
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveData();
                showToast('💾 已保存', 'success');
                return;
            }
            
            // Ctrl+N 新增（依當前頁面）
            if (e.ctrlKey && e.key === 'n') {
                e.preventDefault();
                switch (state.currentPage) {
                    case 'receivables':
                        showAddReceivableModal();
                        break;
                    case 'payables':
                        showAddPayableModal();
                        break;
                    case 'contracts':
                        showAddContractModal();
                        break;
                    case 'projects':
                        showAddProjectModal();
                        break;
                    case 'customers':
                        showAddCustomerModal();
                        break;
                    case 'vendors':
                        showAddVendorModal();
                        break;
                    default:
                        showToast('此頁面無新增功能', 'info');
                }
                return;
            }
            
            // Ctrl+F 搜尋（聚焦搜尋框）
            if (e.ctrlKey && e.key === 'f') {
                var searchInput = document.querySelector('input[placeholder*="搜尋"]') || 
                                  document.querySelector('input[type="search"]');
                if (searchInput) {
                    e.preventDefault();
                    searchInput.focus();
                }
                return;
            }
            
            // 數字鍵快速切換頁面（不在輸入時）
            var pageMap = {
                '1': 'dashboard',
                '2': 'receivables',
                '3': 'payables',
                '4': 'contracts',
                '5': 'projects',
                '6': 'vendors'
            };
            if (pageMap[e.key] && !e.ctrlKey && !e.altKey) {
                navigateTo(pageMap[e.key]);
                return;
            }
        });
        
        // 啟動
        render();
    </script>
</body>
</html>
